function PurchasesPage({ ctx }) {
  const { u, purchases, setPurchases, suppliers, products, setProducts, addLog, setModal, showToast } = ctx;
  const [search, setSearch] = useState("");

  const filtered = purchases.filter(p=>smartMatch(p.code,search)||smartMatch(p.supplierName,search));

  const markPaid = (id) => {
    const p=purchases.find(x=>x.id===id);
    setPurchases(ps=>ps.map(x=>x.id===id?{...x,paid:x.total,status:"paid"}:x));
    addLog("purchase_paid",`Thanh toán NCC ${p?.supplierName} — phiếu ${p?.code}`);
    showToast("Đã thanh toán NCC");
  };

  const del = (id) => {
    const p=purchases.find(x=>x.id===id);
    setPurchases(ps=>ps.filter(x=>x.id!==id));
    addLog("purchase_delete",`Xóa phiếu nhập ${p?.code}`);
    showToast("Đã xóa");
  };

  const openNew = () => setModal(
    <PurchaseForm u={u} suppliers={suppliers} products={products}
      onAddSupplier={(ns) => { ctx.setSuppliers(ss=>[...ss,ns]); addLog("supplier_create",`Thêm NCC mới: ${ns.name}`); }}
      onAddProduct={(np) => { setProducts(ps=>[...ps,np]); addLog("product_create",`Thêm SP mới từ phiếu nhập: ${np.name}`); }}
      onSave={order=>{
        const code=`NH${String(purchases.length+1).padStart(3,"0")}`;
        setPurchases(ps=>[{...order,id:uid(),code},...ps]);
        setProducts(prods=>prods.map(p=>{ const it=order.items.find(i=>i.productId===p.id); return it?{...p,stock:p.stock+it.qty}:p; }));
        addLog("purchase_create",`Tạo phiếu nhập ${code} — ${order.supplierName} — ${fmt(order.total)}`);
        setModal(null); showToast("Đã tạo phiếu nhập "+code);
      }} onClose={()=>setModal(null)} />
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm phiếu nhập..." />
        {can(u,"purchase_create") && <button className="btn btn-primary" onClick={openNew}><Ic n="plus" s={14}/>Tạo phiếu nhập</button>}
      </div>
      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Mã phiếu</th><th>Nhà cung cấp</th><th>Ngày</th><th>Tổng tiền</th><th>Đã TT</th><th>Còn nợ</th><th>TT</th><th></th></tr></thead>
            <tbody>
              {filtered.map(p=>(
                <tr key={p.id}>
                  <td className="mono" style={{ color:"var(--info)", fontWeight:700 }}>{p.code}</td>
                  <td style={{ fontWeight:600 }}>{p.supplierName}</td>
                  <td style={{ color:"var(--muted)" }}>{p.date}</td>
                  <td style={{ fontWeight:700 }}>{fmt(p.total)}</td>
                  <td style={{ color:"var(--green)" }}>{fmt(p.paid)}</td>
                  <td style={{ fontWeight:700, color:p.total-p.paid>0?"var(--danger)":"var(--green)" }}>{fmt(p.total-p.paid)}</td>
                  <td><StatusBadge status={p.status}/></td>
                  <td>
                    <div style={{ display:"flex", gap:5 }}>
                      {p.status!=="paid" && can(u,"purchase_pay") && <button className="btn btn-yellow btn-xs" onClick={()=>markPaid(p.id)}><Ic n="check" s={13}/>Trả</button>}
                      {can(u,"purchase_delete") && <button className="btn btn-danger btn-xs" onClick={()=>del(p.id)}><Ic n="trash" s={13}/></button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function PurchaseForm({ u, suppliers, products, onSave, onClose, onAddSupplier, onAddProduct }) {
  const draftKey = `sp3_draft_purchase_${u.id}`;
  const saved = (() => { try { const s=localStorage.getItem(draftKey); return s?JSON.parse(s):null; } catch { return null; } })();

  const [supId, setSupId] = useState(saved?.supId || suppliers[0]?.id || "");
  const [items, setItems] = useState(saved?.items || []);
  const [paid,  setPaid]  = useState(saved?.paid  || 0);
  const [hasDraft, setHD] = useState(!!saved);

  // New supplier inline
  const [showNewSup, setShowNewSup] = useState(false);
  const [nsName,    setNsName]    = useState("");
  const [nsPhone,   setNsPhone]   = useState("");
  const [nsContact, setNsContact] = useState("");
  const [nsEmail,   setNsEmail]   = useState("");
  const [nsAddr,    setNsAddr]    = useState("");
  const [supSearch, setSupSearch] = useState("");
  const [showSupDD, setShowSupDD] = useState(false);

  // Product search (autocomplete thay cho dropdown dài)
  const [prodSearch, setProdSearch] = useState("");
  const [showProdDD, setShowProdDD] = useState(false);
  const [newProdRow, setNewProdRow] = useState(null); // false=not editing, true=opening blank new-product form from search

  const saveDraft = () => { localStorage.setItem(draftKey,JSON.stringify({supId,items,paid})); setHD(true); };
  const clearDraft = () => { localStorage.removeItem(draftKey); setHD(false); };

  const total = items.reduce((s,i)=>s+i.qty*i.price,0);
  const sup = suppliers.find(s=>s.id===supId);

  const setItem = (idx,k,v) => setItems(is=>is.map((x,i)=>i===idx?{...x,[k]:v}:x));
  const removeItem = (idx) => setItems(is=>is.filter((_,i)=>i!==idx));

  const prodFiltered = prodSearch.trim()
    ? products.filter(p => smartMatch(p.name,prodSearch) || smartMatch(p.code,prodSearch)).slice(0,10)
    : [];

  const addProductRow = (p) => {
    const existing = items.find(i=>i.productId===p.id);
    if (existing) {
      setItems(is=>is.map(x=>x.productId===p.id?{...x,qty:x.qty+1}:x));
    } else {
      setItems(is=>[...is, { productId:p.id, productName:p.name, unit:p.unit, qty:1, price:p.costPrice||0 }]);
    }
    setProdSearch(""); setShowProdDD(false);
  };

  const supFiltered = supSearch.trim()
    ? suppliers.filter(s => smartMatch(s.name,supSearch) || smartMatch(s.phone,supSearch) || smartMatch(s.code,supSearch)).slice(0,8)
    : [];

  const submitNewSupplier = () => {
    if (!nsName.trim()) return;
    const ns = { id: uid(), code:`NCC${String(suppliers.length+1).padStart(3,"0")}`, name:nsName.trim(), phone:nsPhone.trim(), contact:nsContact.trim(), email:nsEmail.trim(), address:nsAddr.trim() };
    onAddSupplier(ns);
    setSupId(ns.id);
    setShowNewSup(false); setNsName(""); setNsPhone(""); setNsContact(""); setNsEmail(""); setNsAddr(""); setSupSearch("");
  };

  const submitNewProduct = (newProd) => {
    onAddProduct(newProd);
    setItems(is=>[...is, { productId:newProd.id, productName:newProd.name, unit:newProd.unit, qty:1, price:newProd.costPrice||0 }]);
    setNewProdRow(null);
    setProdSearch(""); setShowProdDD(false);
  };

  const save = () => {
    if (!supId || items.length===0) return;
    const enriched = items.map(i=>({ productId:i.productId, productName:i.productName, unit:i.unit, qty:i.qty, price:i.price }));
    onSave({ supplierId:supId, supplierName:sup?.name, date:todayStr(), total, paid:Math.min(paid,total), status:paid>=total?"paid":paid>0?"partial":"unpaid", items:enriched, createdBy:u.id, createdByName:u.name });
    clearDraft();
  };

  return (
    <div style={{ minWidth:480 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h3 style={{ fontWeight:800 }}>Tạo phiếu nhập hàng</h3>
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn btn-ghost btn-sm" onClick={saveDraft}><Ic n="save" s={14}/>Lưu nháp</button>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
        </div>
      </div>
      {hasDraft && <div style={{ fontSize:12, color:"var(--acc)", background:"#00d4aa11", padding:"6px 12px", borderRadius:8, marginBottom:12 }}>📂 Bản nháp đã lưu — <button onClick={clearDraft} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--danger)",fontSize:12,fontFamily:"inherit" }}>Xóa</button></div>}

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

        {/* ═══ NHÀ CUNG CẤP ═══ */}
        <div>
          <label className="label">Nhà cung cấp</label>
          {!showNewSup && !sup && (
            <div style={{ position:"relative" }}>
              <div style={{ position:"relative" }}>
                <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)" }}><Ic n="search" s={14}/></span>
                <input className="input" style={{ paddingLeft:34 }}
                  placeholder="Tìm tên, SĐT, mã NCC..."
                  value={supSearch}
                  onChange={e=>{ setSupSearch(e.target.value); setShowSupDD(true); }}
                  onFocus={()=>setShowSupDD(true)}
                  onBlur={()=>setTimeout(()=>setShowSupDD(false),180)}
                />
              </div>
              {showSupDD && supSearch.trim() && (
                <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:50, background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:10, marginTop:4, maxHeight:220, overflowY:"auto", boxShadow:"0 8px 24px #00000055" }}>
                  {supFiltered.length===0 && <div style={{ padding:12, textAlign:"center", color:"var(--muted)", fontSize:12 }}>Không tìm thấy NCC</div>}
                  {supFiltered.map(s=>(
                    <div key={s.id} onMouseDown={()=>{ setSupId(s.id); setSupSearch(""); setShowSupDD(false); }}
                      style={{ padding:"9px 14px", cursor:"pointer", borderBottom:"1px solid var(--bdr)22" }}
                      onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{ fontWeight:700, fontSize:13 }}>{s.name} <span style={{ color:"var(--muted)", fontWeight:400, fontSize:11 }}>— {s.code}</span></div>
                      <div style={{ fontSize:11, color:"var(--muted)" }}>📞 {s.phone||"—"} · 📍 {s.address||"—"}</div>
                    </div>
                  ))}
                  <div onMouseDown={()=>{ setShowNewSup(true); setNsName(supSearch); setShowSupDD(false); }}
                    style={{ padding:"9px 14px", cursor:"pointer", color:"var(--acc)", fontWeight:600, fontSize:13, borderTop:"1px solid var(--bdr)" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <Ic n="plus" s={13}/> Tạo NCC mới: "<b>{supSearch}</b>"
                  </div>
                </div>
              )}
            </div>
          )}

          {/* NCC đã chọn */}
          {sup && !showNewSup && (
            <div style={{ background:"var(--sur2)", borderRadius:8, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
              <div>
                <div style={{ fontWeight:700, fontSize:14, color:"var(--info)" }}>{sup.name}</div>
                <div style={{ fontSize:12, color:"var(--muted)" }}>
                  📞 {sup.phone||"—"} · 📍 {sup.address||"—"}
                  {sup.contact && <> · 👤 {sup.contact}</>}
                </div>
              </div>
              <button onMouseDown={()=>{ setSupId(""); setSupSearch(""); }} className="btn btn-ghost btn-xs" style={{ color:"var(--danger)", flexShrink:0 }}>
                <Ic n="x" s={13}/>Đổi NCC
              </button>
            </div>
          )}

          {showNewSup && (
            <div style={{ background:"var(--sur2)", borderRadius:10, padding:"12px 14px", border:"1px dashed var(--acc)55" }}>
              <div style={{ fontSize:11, color:"var(--acc)", fontWeight:700, marginBottom:8 }}>⚡ Nhà cung cấp mới:</div>
              <div className="form-row" style={{ gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>TÊN NCC *</label>
                  <input className="input" placeholder="Tên công ty / NCC..." value={nsName} onChange={e=>setNsName(e.target.value)} style={{ fontSize:12 }}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>SỐ ĐIỆN THOẠI</label>
                  <input className="input" placeholder="09xx..." value={nsPhone} onChange={e=>setNsPhone(e.target.value)} style={{ fontSize:12 }}/>
                </div>
              </div>
              <div className="form-row" style={{ gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>NGƯỜI LIÊN HỆ</label>
                  <input className="input" placeholder="Tên người liên hệ..." value={nsContact} onChange={e=>setNsContact(e.target.value)} style={{ fontSize:12 }}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>EMAIL</label>
                  <input className="input" placeholder="email@..." value={nsEmail} onChange={e=>setNsEmail(e.target.value)} style={{ fontSize:12 }}/>
                </div>
              </div>
              <div style={{ marginBottom:10 }}>
                <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>ĐỊA CHỈ</label>
                <input className="input" placeholder="Địa chỉ NCC..." value={nsAddr} onChange={e=>setNsAddr(e.target.value)} style={{ fontSize:12 }}/>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button className="btn btn-primary btn-sm" onClick={submitNewSupplier} disabled={!nsName.trim()}><Ic n="plus" s={13}/>Thêm & chọn</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowNewSup(false)}>Hủy</button>
              </div>
            </div>
          )}
        </div>

        {/* ═══ HÀNG NHẬP ═══ */}
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <label className="label" style={{ margin:0 }}>Hàng nhập</label>
            <span style={{ fontSize:11, color:"var(--muted)" }}>{items.length} mặt hàng</span>
          </div>

          {/* Ô tìm kiếm sản phẩm */}
          <div style={{ position:"relative", marginBottom:10 }}>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)" }}><Ic n="search" s={14}/></span>
              <input className="input" style={{ paddingLeft:34 }}
                placeholder="Tìm sản phẩm theo tên, mã SP..."
                value={prodSearch}
                onChange={e=>{ setProdSearch(e.target.value); setShowProdDD(true); }}
                onFocus={()=>setShowProdDD(true)}
                onBlur={()=>setTimeout(()=>setShowProdDD(false),180)}
              />
            </div>
            {showProdDD && prodSearch.trim() && (
              <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:50, background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:10, marginTop:4, maxHeight:260, overflowY:"auto", boxShadow:"0 8px 24px #00000055" }}>
                {prodFiltered.length===0 && <div style={{ padding:12, textAlign:"center", color:"var(--muted)", fontSize:12 }}>Không tìm thấy sản phẩm</div>}
                {prodFiltered.map(p=>(
                  <div key={p.id} onMouseDown={()=>addProductRow(p)}
                    style={{ padding:"9px 14px", cursor:"pointer", borderBottom:"1px solid var(--bdr)22", display:"flex", justifyContent:"space-between", alignItems:"center" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:13 }}>{p.name}</div>
                      <div style={{ fontSize:11, color:"var(--muted)" }}>{p.code} · {p.unit} · Vốn: {fmt(p.costPrice)}</div>
                    </div>
                    <span className="badge badge-blue" style={{ fontSize:10 }}>Kho: {p.stock}</span>
                  </div>
                ))}
                {/* Tạo hàng mới nếu tìm không thấy */}
                <div onMouseDown={()=>{ setNewProdRow(true); setShowProdDD(false); }}
                  style={{ padding:"9px 14px", cursor:"pointer", color:"var(--acc)", fontWeight:600, fontSize:13, borderTop:"1px solid var(--bdr)" }}
                  onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <Ic n="plus" s={13}/> Tạo hàng mới: "<b>{prodSearch}</b>"
                </div>
              </div>
            )}
          </div>

          {/* Danh sách đã thêm */}
          {items.length===0 && <div style={{ textAlign:"center", padding:"14px 10px", color:"var(--muted)", fontSize:12 }}>Tìm sản phẩm ở ô trên để thêm vào phiếu nhập</div>}
          {items.length>0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 60px 60px 90px 22px", gap:6, padding:"0 4px" }}>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700 }}>SẢN PHẨM</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center" }}>ĐVT</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center" }}>SL</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"right" }}>GIÁ NHẬP</span>
                <span></span>
              </div>
              {items.map((item,idx)=>(
                <div key={idx} style={{ display:"grid", gridTemplateColumns:"1fr 60px 60px 90px 22px", gap:6, alignItems:"center", padding:"6px 4px", background:"var(--sur2)", borderRadius:6 }}>
                  <div style={{ fontWeight:600, fontSize:12 }}>{item.productName}</div>
                  <div style={{ fontSize:11, color:"var(--muted)", textAlign:"center" }}>{item.unit}</div>
                  <input className="input" type="number" min="1" value={item.qty} onChange={e=>setItem(idx,"qty",+e.target.value)} style={{ padding:"4px 6px", fontSize:12, textAlign:"center" }}/>
                  <input className="input" type="number" value={item.price} onChange={e=>setItem(idx,"price",+e.target.value)} style={{ padding:"4px 6px", fontSize:12, textAlign:"right" }}/>
                  <button onClick={()=>removeItem(idx)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--danger)",padding:0 }}><Ic n="x" s={14}/></button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div><label className="label">Đã thanh toán NCC (đ)</label><input className="input" type="number" value={paid} onChange={e=>setPaid(+e.target.value)}/></div>
        <div style={{ background:"var(--sur2)", borderRadius:10, padding:"14px 16px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontWeight:700 }}>
            <span style={{ color:"var(--muted)" }}>Tổng nhập:</span>
            <span style={{ color:"var(--info)", fontSize:18 }}>{fmt(total)}</span>
          </div>
          {total-paid>0 && <div style={{ color:"var(--danger)", fontSize:13, marginTop:4 }}>⚠ Nợ NCC: {fmt(total-paid)}</div>}
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={save} disabled={!supId || items.length===0}><Ic n="check" s={15}/>Tạo phiếu</button>
        </div>
      </div>

      {/* Mini modal để tạo SP mới ngay tại dòng */}
      {newProdRow && (
        <div style={{ position:"fixed", inset:0, background:"#000000aa", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"var(--sur)", borderRadius:14, padding:22, width:380, border:"1px solid var(--bdr)" }}>
            <NewProductInline initialName={prodSearch} onSubmit={submitNewProduct} onCancel={()=>setNewProdRow(false)} productsCount={products.length} />
          </div>
        </div>
      )}
    </div>
  );
}

// Form nhỏ tạo SP mới ngay trong phiếu nhập
function NewProductInline({ onSubmit, onCancel, productsCount, initialName }) {
  const [name, setName] = useState(initialName || "");
  const [unit, setUnit] = useState("Cái");
  const [costPrice, setCostPrice] = useState(0);

  const autoCode = () => {
    const words = name.trim().split(/\s+/);
    return words.map(w=>w.charAt(0).toUpperCase()).join("").slice(0,4) + String(productsCount+1).padStart(2,"0");
  };

  const submit = () => {
    if (!name.trim()) return;
    onSubmit({ id:uid(), code:autoCode(), name:name.trim(), unit, stock:0, damaged:0, costPrice, retailPrice:0, price:0, category:"Khác", supplierId:"" });
  };

  return (
    <div>
      <div style={{ fontWeight:800, fontSize:15, marginBottom:14 }}>⚡ Tạo hàng mới</div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        <div>
          <label className="label">Tên sản phẩm *</label>
          <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Tên hàng..." autoFocus/>
        </div>
        <div className="form-row">
          <div>
            <label className="label">Đơn vị</label>
            <select className="input" value={unit} onChange={e=>setUnit(e.target.value)}>
              {["Cái","Bộ","Thùng","Can","Hộp","Chai","md","m2","kg","tấn","Khác"].map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Giá vốn (đ)</label>
            <input className="input" type="number" value={costPrice} onChange={e=>setCostPrice(+e.target.value)} />
          </div>
        </div>
        <div style={{ fontSize:11, color:"var(--muted)" }}>
          Mã SP sẽ tự tạo. Giá bán buôn/lẻ có thể cập nhật sau ở trang Sản phẩm/Kho.
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:6 }}>
          <button className="btn btn-ghost" onClick={onCancel}>Hủy</button>
          <button className="btn btn-primary" onClick={submit} disabled={!name.trim()}><Ic n="check" s={15}/>Thêm & dùng</button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
function ProductsPage({ ctx }) {
  const { u, products, setProducts, suppliers, addLog, setModal, showToast } = ctx;
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState([]);
  const fileRef = useRef();

  const filtered = products.filter(p=>smartMatch(p.name,search)||smartMatch(p.code,search));

  // Auto-generate code from name
  const autoCode = (name) => {
    const words = name.trim().split(/\s+/);
    const prefix = words.map(w => w.charAt(0).toUpperCase()).join("").slice(0,4);
    const existing = products.filter(p => p.code.startsWith(prefix)).length;
    return prefix + String(existing + 1).padStart(2,"0");
  };

  // Toggle select
  const toggleSel = (id) => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);
  const toggleAll = () => {
    if(selected.length === filtered.length) setSelected([]);
    else setSelected(filtered.map(p=>p.id));
  };

  // Bulk price edit
  const openBulkEdit = () => {
    if(selected.length===0){ showToast("Chọn ít nhất 1 sản phẩm","error"); return; }
    setModal(
      <BulkPriceEdit count={selected.length}
        onApply={(field, amount) => {
          setProducts(ps=>ps.map(p=>{
            if(!selected.includes(p.id)) return p;
            return { ...p, [field]: Math.max(0, (p[field]||0) + amount) };
          }));
          addLog("product_update",`Sửa giá hàng loạt ${selected.length} SP: ${field} ${amount>=0?"+":""}${new Intl.NumberFormat("vi-VN").format(amount)}đ`);
          setModal(null); setSelected([]); showToast(`Đã cập nhật ${selected.length} sản phẩm`);
        }}
        onClose={()=>setModal(null)} />
    );
  };

  const openForm = (p=null) => setModal(
    <ProductForm initial={p} suppliers={suppliers} products={products} readOnly={!can(u,"product_edit")} autoCode={autoCode}
      onSave={data=>{
        if(p){ setProducts(ps=>ps.map(x=>x.id===data.id?data:x)); addLog("product_update",`Sửa sản phẩm ${data.code} — ${data.name}`); }
        else { setProducts(ps=>[...ps,{...data,id:uid()}]); addLog("product_create",`Thêm sản phẩm ${data.code} — ${data.name}`); }
        setModal(null); showToast(p?"Đã cập nhật":"Đã thêm sản phẩm");
      }} onClose={()=>setModal(null)} />
  );

  const del = (p) => {
    if(!can(u,"product_delete")){ showToast("Không có quyền xóa","error"); return; }
    setProducts(ps=>ps.filter(x=>x.id!==p.id));
    addLog("product_delete",`Xóa sản phẩm ${p.code} — ${p.name}`);
    showToast("Đã xóa");
  };

  const exportXLS = () => {
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(products.map(p=>({ "Mã SP":p.code,"Tên":p.name,"DM":p.category,"ĐVT":p.unit,"Tồn":p.stock,"Hàng hỏng":p.damaged||0,"Giá vốn":p.costPrice,"Giá bán lẻ":p.retailPrice||0,"Giá bán buôn":p.price }))),"Sản phẩm"); XLSX.writeFile(wb,"san-pham.xlsx"); showToast("Đã xuất Excel");
  };

  const importXLS = (e) => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=(ev)=>{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const imp=rows.map(r=>{
        const name = r["Tên"]||"";
        return { id:uid(), code:r["Mã SP"]||autoCode(name), name, category:r["DM"]||"Khác", unit:r["ĐVT"]||"Cái", stock:+r["Tồn"]||0, damaged:+r["Hàng hỏng"]||0, costPrice:+r["Giá vốn"]||0, retailPrice:+r["Giá bán lẻ"]||0, price:+r["Giá bán buôn"]||0, supplierId:null };
      });
      setProducts(ps=>[...ps,...imp]);
      addLog("product_create",`Nhập ${imp.length} SP từ Excel`);
      showToast(`Nhập ${imp.length} sản phẩm`);
    };
    r.readAsBinaryString(f); e.target.value="";
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm sản phẩm..." />
        <button className="btn btn-ghost btn-sm" onClick={exportXLS}><Ic n="excel" s={14}/>Xuất Excel</button>
        {can(u,"product_edit") && <><button className="btn btn-ghost btn-sm" onClick={()=>fileRef.current.click()}><Ic n="upload" s={14}/>Nhập Excel</button><input ref={fileRef} type="file" accept=".xlsx" style={{ display:"none" }} onChange={importXLS}/></>}
        {can(u,"product_create") && <button className="btn btn-primary" onClick={()=>openForm()}><Ic n="plus" s={14}/>Thêm sản phẩm</button>}
      </div>

      {/* Bulk action bar */}
      {selected.length>0 && can(u,"product_edit") && (
        <div style={{ background:"var(--sur2)", border:"1px solid var(--acc)33", borderRadius:10, padding:"10px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
          <span style={{ fontSize:13, fontWeight:600, color:"var(--acc)" }}>✓ Đã chọn {selected.length} sản phẩm</span>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn btn-primary btn-sm" onClick={openBulkEdit}><Ic n="edit" s={13}/>Sửa giá hàng loạt</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setSelected([])}>Bỏ chọn</button>
          </div>
        </div>
      )}

      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr>
              {can(u,"product_edit") && <th style={{ width:30 }}><input type="checkbox" checked={selected.length===filtered.length && filtered.length>0} onChange={toggleAll} style={{ cursor:"pointer" }}/></th>}
              <th>Mã SP</th><th>Tên sản phẩm</th><th>ĐVT</th><th>Tồn kho</th><th>Hàng hỏng</th><th>Giá vốn</th><th>Giá bán lẻ</th><th>Giá bán buôn</th><th>Lãi</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(p=>{
                const margin = p.price>0?((p.price-p.costPrice)/p.price*100).toFixed(1):0;
                const isSel = selected.includes(p.id);
                return (
                  <tr key={p.id} style={{ background:isSel?"#00d4aa0a":"transparent" }}>
                    {can(u,"product_edit") && <td><input type="checkbox" checked={isSel} onChange={()=>toggleSel(p.id)} style={{ cursor:"pointer" }}/></td>}
                    <td className="mono" style={{ color:"var(--acc)" }}>{p.code}</td>
                    <td style={{ fontWeight:600 }}>{p.name}</td>
                    <td style={{ color:"var(--muted)" }}>{p.unit}</td>
                    <td><span className={`badge ${p.stock<30?"badge-red":p.stock<50?"badge-yellow":"badge-green"}`}>{p.stock}</span></td>
                    <td style={{ color: (p.damaged||0)>0?"var(--danger)":"var(--muted)", fontWeight:(p.damaged||0)>0?700:400 }}>{p.damaged||0}</td>
                    <td style={{ color:"var(--muted)" }}>{fmt(p.costPrice)}</td>
                    <td style={{ color:"var(--info)" }}>{fmt(p.retailPrice||0)}</td>
                    <td style={{ fontWeight:700, color:"var(--acc)" }}>{fmt(p.price)}</td>
                    <td style={{ color:"var(--green)", fontWeight:700 }}>{margin}%</td>
                    <td>
                      <div style={{ display:"flex", gap:5 }}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>openForm(p)}><Ic n={can(u,"product_edit")?"edit":"eye"} s={13}/></button>
                        {can(u,"product_delete") && <button className="btn btn-danger btn-xs" onClick={()=>del(p)}><Ic n="trash" s={13}/></button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ProductForm({ initial, onSave, onClose, suppliers, products, readOnly, autoCode }) {

  const s = (k,v) => {
    setF(x => {
      const next = {...x,[k]:v};
      // Auto-generate code when name changes and code is empty or auto-generated
      if(k==="name" && !initial && autoCode) {
        next.code = autoCode(v);
      }
      return next;
    });

  const margin = f.price>0?((f.price-f.costPrice)/f.price*100).toFixed(1):0;

    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h3 style={{ fontWeight:800 }}>{readOnly?"Xem sản phẩm":initial?"Sửa sản phẩm":"Thêm sản phẩm"}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div><label className="label">Tên sản phẩm</label><input className="input" value={f.name} onChange={e=>s("name",e.target.value)} disabled={readOnly} placeholder="Gõ tên → mã SP tự tạo"/></div>
        <div className="form-row">
          <div><label className="label">Mã SP (tự động)</label><input className="input mono" value={f.code} onChange={e=>s("code",e.target.value)} disabled={readOnly} style={{ color:"var(--acc)" }}/></div>
          <div><label className="label">Danh mục</label>
            <select className="input" value={f.category} onChange={e=>s("category",e.target.value)} disabled={readOnly}>
              {["Nội thất","Nước uống","Nước ngọt","Thực phẩm","Gia vị","Đồ khô","Khác"].map(c=><option key={c}>{c}</option>)}

        </div>
        <div className="form-row">
          <div><label className="label">Đơn vị tính</label>
            <select className="input" value={f.unit} onChange={e=>s("unit",e.target.value)} disabled={readOnly}>
              {["Cái","Bộ","Thùng","Can","Hộp","Chai","md","m2","kg","tấn","Khác"].map(u=><option key={u}>{u}</option>)}

          <div><label className="label">NCC</label>
            <select className="input" value={f.supplierId} onChange={e=>s("supplierId",e.target.value)} disabled={readOnly}>

        <div className="form-row">

          <div><label className="label">Hàng hỏng</label><input className="input" type="number" value={f.damaged||0} onChange={e=>s("damaged",+e.target.value)} disabled={readOnly}/></div>
        </div>
        <div style={{ background:"var(--sur2)", borderRadius:10, padding:14, border:"1px solid var(--bdr)" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--muted)", textTransform:"uppercase", marginBottom:10 }}>Bảng giá</div>
          <div className="form-row" style={{ marginBottom:10 }}>
            <div><label className="label">Giá vốn (đ)</label><input className="input" type="number" value={f.costPrice} onChange={e=>s("costPrice",+e.target.value)} disabled={readOnly}/></div>
            <div><label className="label">Giá bán lẻ (đ)</label><input className="input" type="number" value={f.retailPrice||0} onChange={e=>s("retailPrice",+e.target.value)} disabled={readOnly}/></div>
          </div>
          <div><label className="label">Giá bán buôn (đ)</label><input className="input" type="number" value={f.price} onChange={e=>s("price",+e.target.value)} disabled={readOnly} style={{ fontWeight:700, fontSize:15 }}/></div>
        </div>

          ✓ Lợi nhuận buôn: {fmt(f.price-f.costPrice)} / {f.unit} — Tỷ suất: {margin}%
          {(f.retailPrice||0)>0 && <span style={{ marginLeft:10 }}>| Lãi lẻ: {fmt((f.retailPrice||0)-f.costPrice)}</span>}

          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>

function CustomersPage({ ctx, setPage, setSelectedCustomerId }) {
  const { u, customers, setCusts, orders, addLog, setModal, showToast } = ctx;
  const [search, setSearch] = useState("");
  const fileRef = useRef();

  const filtered = customers.filter(c=>smartMatch(c.name,search)||smartMatch(c.phone,search)||smartMatch(c.code,search));
  const getDebt = (id) => orders.filter(o=>o.customerId===id).reduce((s,o)=>s+(o.isPaid?0:o.total),0);
  const openDetail = (id) => { setSelectedCustomerId(id); setPage("customer_detail"); };

  // Auto-generate mã KH
  const nextCode = () => `KH${String(customers.length+1).padStart(3,"0")}`;

  // ── OPEN FORM ─────────────────────────────────────────
  const openForm = (c=null) => setModal(<CustomerForm
    initial={c} nextCode={nextCode()} readOnly={c&&!can(u,"customer_edit")}
    onSave={data=>{
      if(c){ setCusts(cs=>cs.map(x=>x.id===c.id?{...x,...data}:x)); addLog("customer_update",`Sửa KH ${data.name}`); }
      else { setCusts(cs=>[...cs,{...data,id:uid(),totalBought:0}]); addLog("customer_create",`Thêm KH ${data.name}`); }
      setModal(null); showToast(c?"Đã cập nhật":"Đã thêm KH");
    }} onClose={()=>setModal(null)} />
  );

  // ── XUẤT EXCEL ────────────────────────────────────────
  // Mẫu: Mã KH | Tên KH | Địa chỉ KH | Số ĐT
  const exportXLS = () => {
    const rows = customers.map(c=>({
      "Mã KH":    c.code  || "",
      "Tên KH":   c.name  || "",
      "Địa chỉ KH": c.address || "",
      "Số ĐT":    c.phone || "",
    }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), "Khách hàng");
    XLSX.writeFile(wb, "danh-sach-khach-hang.xlsx");
    showToast("Đã xuất danh sách khách hàng");
  };

  // ── NHẬP EXCEL ────────────────────────────────────────
  const importXLS = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const wb = XLSX.read(ev.target.result, { type:"binary" });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      let count = 0;
      const newCusts = [];
      rows.forEach(r => {
        const name = (r["Tên KH"]||r["ten_kh"]||r["Tên"]||"").trim();
        if(!name) return;
        // Tự tạo mã KH nếu không có
        const code = (r["Mã KH"]||r["ma_kh"]||"").trim() ||
          `KH${String(customers.length + newCusts.length + 1).padStart(3,"0")}`;
        const address = (r["Địa chỉ KH"]||r["dia_chi"]||r["Địa chỉ"]||"").trim();
        const phone   = String(r["Số ĐT"]||r["so_dt"]||r["ĐT"]||"").trim();
        newCusts.push({ id:uid(), code, name, address, phone, totalBought:0 });
        count++;
      });
      setCusts(cs=>[...cs, ...newCusts]);
      addLog("customer_create", `Nhập ${count} khách hàng từ Excel`);
      showToast(`Đã nhập ${count} khách hàng`);
    };
    reader.readAsBinaryString(file);
    e.target.value = "";
  };

  // ── DOWNLOAD TEMPLATE ─────────────────────────────────
  const downloadTemplate = () => {
    const sample = [
      { "Mã KH":"KH001", "Tên KH":"Tạp hóa Bà Lan", "Địa chỉ KH":"123, Lê Lợi, Phường 1, Hà Nội", "Số ĐT":"0901234567" },
      { "Mã KH":"KH002", "Tên KH":"Siêu thị Mini Hùng", "Địa chỉ KH":"456, Nguyễn Trãi, Phường 5, TP.HCM", "Số ĐT":"0912345678" },
      { "Mã KH":"",      "Tên KH":"(Để trống mã KH → tự động tạo)", "Địa chỉ KH":"số nhà, đường, phường, tỉnh/TP", "Số ĐT":"" },
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sample), "Mẫu nhập KH");
    XLSX.writeFile(wb, "mau-nhap-khach-hang.xlsx");
    showToast("Đã tải file mẫu");
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* Toolbar */}
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm tên, SĐT, mã KH..." />
        <button className="btn btn-ghost btn-sm" onClick={exportXLS}><Ic n="excel" s={14}/>Xuất Excel</button>
        {can(u,"customer_create") && <>
          <button className="btn btn-ghost btn-sm" onClick={()=>fileRef.current.click()}><Ic n="upload" s={14}/>Nhập Excel</button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={importXLS}/>
          <button className="btn btn-ghost btn-sm" onClick={downloadTemplate} title="Tải file Excel mẫu"><Ic n="download" s={14}/>File mẫu</button>
          <button className="btn btn-primary" onClick={()=>openForm()}><Ic n="plus" s={14}/>Thêm KH</button>
        </>}
      </div>

      {/* Hint về cấu trúc địa chỉ */}
      <div style={{ fontSize:12, color:"var(--muted)", background:"var(--sur2)", padding:"8px 14px", borderRadius:8 }}>
        📍 Cấu trúc địa chỉ: <b style={{ color:"var(--text)" }}>Số nhà, Đường, Phường, Tỉnh/TP</b>
        &nbsp;— VD: <span style={{ color:"var(--acc)" }}>16065, Đê La Thành, Phường Láng, Hà Nội</span>
      </div>

      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead>
              <tr>
                <th>Mã KH</th>
                <th>Tên KH</th>
                <th>Số ĐT</th>
                <th className="hide-mobile">Địa chỉ KH</th>
                <th>Tổng mua</th>
                <th>Công nợ</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.length===0 && <tr><td colSpan={7} style={{ textAlign:"center", color:"var(--muted)", padding:30 }}>Không có khách hàng</td></tr>}
              {filtered.map(c=>{
                const debt = getDebt(c.id);
                return (
                  <tr key={c.id}>
                    <td><a className="link" onClick={()=>openDetail(c.id)}>{c.code}</a></td>
                    <td><a className="link-name" onClick={()=>openDetail(c.id)}>{c.name}</a></td>
                    <td style={{ color:"var(--muted)", fontSize:13 }}>{c.phone||"—"}</td>
                    <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{c.address||"—"}</td>
                    <td style={{ fontWeight:700 }}>{fmt(c.totalBought)}</td>
                    <td style={{ fontWeight:700, color:debt>0?"var(--danger)":"var(--green)" }}>{fmt(debt)}</td>

                      <div style={{ display:"flex", gap:5 }}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>openForm(c)}>
                          <Ic n={can(u,"customer_edit")?"edit":"eye"} s={13}/>
                        </button>
                        {can(u,"customer_delete") && (
                          <button className="btn btn-danger btn-xs" onClick={()=>{
                            setCusts(cs=>cs.filter(x=>x.id!==c.id));
                            addLog("customer_delete",`Xóa KH ${c.name}`);
                            showToast("Đã xóa");

                    </td>

        Tổng: <b>{customers.length}</b> khách hàng · Hiện: <b>{filtered.length}</b>
      </div>
    </div>
  );
}

// Form thêm/sửa khách hàng với địa chỉ cấu trúc
function CustomerForm({ initial, nextCode, readOnly, onSave, onClose }) {
  const parseAddr = (addr) => {
    const parts = (addr||"").split(",").map(s=>s.trim());
    return { soNha: parts[0]||"", duong: parts[1]||"", phuong: parts[2]||"", tp: parts[3]||"" };
  };
  const parsed = parseAddr(initial?.address);

  const [code,   setCode]   = useState(initial?.code   || nextCode);
  const [name,   setName]   = useState(initial?.name   || "");
  const [phone,  setPhone]  = useState(initial?.phone  || "");
  const [soNha,  setSoNha]  = useState(parsed.soNha);
  const [duong,  setDuong]  = useState(parsed.duong);
  const [phuong, setPhuong] = useState(parsed.phuong);
  const [tp,     setTp]     = useState(parsed.tp);

  const buildAddress = () => [soNha, duong, phuong, tp].filter(Boolean).join(", ");

  const save = () => {
    if(!name.trim()){ return; }
    onSave({ code, name: name.trim(), phone: phone.trim(), address: buildAddress() });
  };

  return (
    <div style={{ minWidth:440 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <h3 style={{ fontWeight:800 }}>{readOnly?"Xem KH":initial?"Sửa khách hàng":"Thêm khách hàng"}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div className="form-row">
          <div>
            <label className="label">Mã KH (tự động)</label>
            <input className="input mono" value={code} onChange={e=>setCode(e.target.value)} disabled={readOnly} style={{ color:"var(--acc)" }}/>
          </div>
          <div>
            <label className="label">Số điện thoại</label>
            <input className="input" value={phone} onChange={e=>setPhone(e.target.value)} disabled={readOnly} placeholder="09xx..."/>
          </div>
        </div>
        <div>
          <label className="label">Tên khách hàng *</label>
          <input className="input" value={name} onChange={e=>setName(e.target.value)} disabled={readOnly} placeholder="Tên KH..."/>
        </div>

        {/* Địa chỉ cấu trúc */}
        <div style={{ background:"var(--sur2)", borderRadius:10, padding:"12px 14px", border:"1px solid var(--bdr)" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--muted)", textTransform:"uppercase", marginBottom:10 }}>
            Địa chỉ <span style={{ color:"var(--muted)", fontWeight:400, fontSize:10 }}>— mỗi mục cách nhau bằng dấu (,)</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:8, marginBottom:8 }}>
            <div>
              <label className="label" style={{ fontSize:10 }}>SỐ NHÀ</label>
              <input className="input" value={soNha} onChange={e=>setSoNha(e.target.value)} disabled={readOnly} placeholder="16065" style={{ fontSize:12 }}/>
            </div>
            <div>
              <label className="label" style={{ fontSize:10 }}>ĐƯỜNG</label>
              <input className="input" value={duong} onChange={e=>setDuong(e.target.value)} disabled={readOnly} placeholder="Đê La Thành" style={{ fontSize:12 }}/>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div>
              <label className="label" style={{ fontSize:10 }}>PHƯỜNG / XÃ</label>
              <input className="input" value={phuong} onChange={e=>setPhuong(e.target.value)} disabled={readOnly} placeholder="Phường Láng" style={{ fontSize:12 }}/>
            </div>
            <div>
              <label className="label" style={{ fontSize:10 }}>TỈNH / THÀNH PHỐ</label>
              <input className="input" value={tp} onChange={e=>setTp(e.target.value)} disabled={readOnly} placeholder="Hà Nội" style={{ fontSize:12 }}/>
            </div>
          </div>
          {/* Preview địa chỉ */}
          {buildAddress() && (
            <div style={{ marginTop:8, fontSize:11, color:"var(--acc)", background:"#00d4aa0a", padding:"5px 10px", borderRadius:6 }}>
              📍 {buildAddress()}
            </div>
          )}
        </div>

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          {!readOnly && <button className="btn btn-primary" onClick={save} disabled={!name.trim()}>
            <Ic n="check" s={15}/>Lưu
          </button>}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
function SuppliersPage({ ctx }) {
  const { u, suppliers, setSuppliers, purchases, addLog, setModal, showToast } = ctx;
  const [search, setSearch] = useState("");

  const filtered = suppliers.filter(s=>smartMatch(s.name,search)||smartMatch(s.code,search)||smartMatch(s.phone,search));
  const getDebt = (id) => purchases.filter(p=>p.supplierId===id).reduce((s,p)=>s+(p.total-p.paid),0);

  const openForm = (s=null) => setModal(
    <SimpleForm title={s?"Sửa NCC":"Thêm NCC"} readOnly={s&&!can(u,"supplier_edit")}
      fields={[
        { key:"code",    label:"Mã NCC",    value:s?.code    || `NCC${String(suppliers.length+1).padStart(3,"0")}` },
        { key:"name",    label:"Tên NCC",   value:s?.name    || "" },
        { key:"phone",   label:"ĐT",        value:s?.phone   || "" },
        { key:"contact", label:"Liên hệ",   value:s?.contact || "" },
        { key:"email",   label:"Email",     value:s?.email   || "" },
        { key:"address", label:"Địa chỉ",   value:s?.address || "" },
      ]}
      onSave={data=>{
        if(s){ setSuppliers(ss=>ss.map(x=>x.id===s.id?{...x,...data}:x)); addLog("supplier_update",`Sửa NCC ${data.name}`); }
        else { setSuppliers(ss=>[...ss,{...data,id:uid()}]); addLog("supplier_create",`Thêm NCC ${data.name}`); }
        setModal(null); showToast(s?"Đã cập nhật":"Đã thêm NCC");
      }} onClose={()=>setModal(null)} />
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm nhà cung cấp..." />
        {can(u,"supplier_edit") && <button className="btn btn-primary" onClick={()=>openForm()}><Ic n="plus" s={14}/>Thêm NCC</button>}
      </div>
      {!can(u,"supplier_edit") && <div style={{ fontSize:12, color:"var(--muted)", background:"var(--sur2)", padding:"6px 12px", borderRadius:8 }}>👁 Bạn chỉ có thể xem thông tin nhà cung cấp</div>}
      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Mã NCC</th><th>Tên NCC</th><th>ĐT</th><th>Liên hệ</th><th className="hide-mobile">Email</th><th>Nợ phải trả</th><th></th></tr></thead>
            <tbody>
              {filtered.map(s=>{
                const debt=getDebt(s.id);
                return (
                  <tr key={s.id}>
                    <td className="mono" style={{ color:"var(--info)" }}>{s.code}</td>
                    <td style={{ fontWeight:700 }}>{s.name}</td>
                    <td style={{ color:"var(--muted)" }}>{s.phone}</td>
                    <td>{s.contact}</td>
                    <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{s.email}</td>
                    <td style={{ fontWeight:700, color:debt>0?"var(--danger)":"var(--green)" }}>{fmt(debt)}</td>
                    <td>
                      <div style={{ display:"flex", gap:5 }}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>openForm(s)}><Ic n={can(u,"supplier_edit")?"edit":"eye"} s={13}/></button>
                        {can(u,"supplier_delete") && <button className="btn btn-danger btn-xs" onClick={()=>{ setSuppliers(ss=>ss.filter(x=>x.id!==s.id)); addLog("supplier_delete",`Xóa NCC ${s.name}`); showToast("Đã xóa"); }}><Ic n="trash" s={13}/></button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// REPORT
// ════════════════════════════════════════════════════════
function ReportPage({ ctx }) {
  const { u, orders, products, customers, purchases, addLog } = ctx;

  useEffect(() => {
    addLog("report_view", `Xem báo cáo doanh thu tổng hợp`);
  }, []);

  const revenue   = orders.reduce((s,o)=>s+o.total,0);
  const collected = orders.reduce((s,o)=>s+o.paid,0);
  const orderDebt = revenue-collected;
  const costGoods = purchases.reduce((s,p)=>s+p.total,0);
  const pDebt     = purchases.reduce((s,p)=>s+(p.total-p.paid),0);
  const profit    = collected-costGoods;

  const bars = [
    { label:"Tổng DT",   val:revenue,   color:"#60a5fa" },
    { label:"Đã thu",    val:collected, color:"#00d4aa" },
    { label:"Công nợ KH",val:orderDebt, color:"#f59e0b" },
    { label:"Tổng nhập", val:costGoods, color:"#a78bfa" },
    { label:"Lợi nhuận", val:profit,    color:profit>=0?"#10b981":"#f43f5e" },
  ];
  const maxBar = Math.max(...bars.map(b=>Math.abs(b.val)),1);

  const topProducts = [...products].sort((a,b)=>(b.price-b.costPrice)-(a.price-a.costPrice)).slice(0,5);
  const debtCusts = customers.map(c=>({ ...c, debt:orders.filter(o=>o.customerId===c.id).reduce((s,o)=>s+(o.total-o.paid),0) })).filter(c=>c.debt>0).sort((a,b)=>b.debt-a.debt);

  const exportXLS = () => {
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(bars.map(b=>({ "Chỉ tiêu":b.label,"Giá trị":b.val }))),"Báo cáo");
    XLSX.writeFile(wb,"bao-cao.xlsx");
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <div style={{ display:"flex", justifyContent:"flex-end" }}>
        <button className="btn btn-ghost btn-sm" onClick={exportXLS}><Ic n="excel" s={14}/>Xuất Excel</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:12 }}>
        {[
          { label:"Tổng doanh thu", val:fmt(revenue), c:"var(--info)" },
          { label:"Đã thu về",      val:fmt(collected), c:"var(--acc)" },
          { label:"Công nợ KH",     val:fmt(orderDebt), c:"var(--yellow)" },
          { label:"Nợ NCC",         val:fmt(pDebt),     c:"var(--danger)" },
          { label:"Lợi nhuận gộp",  val:fmt(profit),    c:profit>=0?"var(--green)":"var(--danger)" },
        ].map((s,i)=>(
          <div key={i} className="card" style={{ borderTop:`3px solid ${s.c}` }}>
            <div style={{ fontSize:11, color:"var(--muted)", fontWeight:600, marginBottom:6 }}>{s.label}</div>
            <div style={{ fontSize:17, fontWeight:800, color:s.c }}>{s.val}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        <div className="card">
          <div className="section-title">📊 Biểu đồ</div>
          {bars.map((b,i)=>(
            <div key={i} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:5 }}>
                <span style={{ color:"var(--muted)", fontWeight:600 }}>{b.label}</span>
                <span style={{ fontWeight:700, color:b.color }}>{fmt(b.val)}</span>
              </div>
              <div style={{ height:8, background:"var(--sur2)", borderRadius:8, overflow:"hidden" }}>
                <div style={{ width:`${(Math.abs(b.val)/maxBar*100).toFixed(1)}%`, height:"100%", background:b.color, borderRadius:8, transition:"width .5s" }} />
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="section-title">🏆 Sản phẩm lãi cao</div>
          {topProducts.map((p,i)=>(
            <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background:"var(--sur2)", borderRadius:8, marginBottom:6 }}>
              <div style={{ width:26, height:26, borderRadius:6, background:["#FFD700","#C0C0C0","#CD7F32","var(--bdr)","var(--bdr)"][i], display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, flexShrink:0 }}>{i+1}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:600, fontSize:12 }}>{p.name}</div>
                <div style={{ fontSize:11, color:"var(--muted)" }}>Tồn: {p.stock} {p.unit}</div>
              </div>
              <div style={{ color:"var(--green)", fontWeight:700, fontSize:13 }}>{fmt(p.price-p.costPrice)}</div>
            </div>
          ))}
        </div>
      </div>
      {debtCusts.length>0 && (
        <div className="card">
          <div className="section-title">⚠ Khách hàng còn nợ</div>
          <div className="table-wrap">
            <table className="table">
              <thead><tr><th>Khách hàng</th><th>ĐT</th><th>Công nợ</th></tr></thead>
              <tbody>
                {debtCusts.map(c=>(
                  <tr key={c.id}>
                    <td style={{ fontWeight:700 }}>{c.name}</td>
                    <td style={{ color:"var(--muted)" }}>{c.phone}</td>
                    <td style={{ fontWeight:800, color:"var(--danger)", fontSize:15 }}>{fmt(c.debt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

const ACTION_COLOR = {
  login:"var(--info)", logout:"var(--muted)", order_create:"var(--acc)", order_delete:"var(--danger)", order_paid:"var(--green)", order_collect:"var(--green)",
  purchase_create:"var(--yellow)", purchase_delete:"var(--danger)", purchase_paid:"var(--green)",
  product_create:"var(--acc)", product_update:"var(--yellow)", product_delete:"var(--danger)",
  customer_create:"var(--acc)", customer_update:"var(--yellow)", customer_delete:"var(--danger)",
  supplier_create:"var(--acc)", supplier_update:"var(--yellow)", supplier_delete:"var(--danger)",
  user_create:"var(--info)", user_update:"var(--yellow)", user_toggle:"var(--yellow)",
  report_view:"var(--muted)",
};

function AuditPage({ ctx }) {
  const { u, auditLog, setAuditLog } = ctx;
  const [search, setSearch] = useState("");
  const [filterUser, setFilterUser] = useState("all");

  // Phạm vi xem: owner=tất cả, manager=nhóm+mình, sale=chỉ mình
  const visible = auditLog.filter(entry => {
    if(can(u,"audit_view_all")) return true;
    if(can(u,"audit_view_team") && !can(u,"audit_view_all")) return entry.userId===u.id; // manager sees own for now
    return entry.userId===u.id;
  });

  const filtered = visible.filter(entry=>{
    const ms = smartMatch(entry.detail,search) || smartMatch(entry.userName,search);
    const mu = filterUser==="all" || entry.userId===filterUser;
    return ms && mu;
  });

  const uniqueUsers = [...new Set(visible.map(e=>e.userId))].map(id=>{ const e=visible.find(x=>x.userId===id); return{ id, name:e?.userName }; });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm thao tác..." />
        {can(u,"audit_view_all") && (
          <select className="input" style={{ width:180 }} value={filterUser} onChange={e=>setFilterUser(e.target.value)}>
            <option value="all">Tất cả nhân viên</option>
            {uniqueUsers.map(uu=><option key={uu.id} value={uu.id}>{uu.name}</option>)}
          </select>
        )}
        {can(u,"audit_view_all") && <button className="btn btn-ghost btn-sm" onClick={()=>setAuditLog([])} style={{ color:"var(--danger)", borderColor:"var(--danger)" }}><Ic n="trash" s={14}/>Xóa log</button>}
      </div>

      {!can(u,"audit_view_all") && (
        <div style={{ fontSize:12, color:"var(--muted)", background:"var(--sur2)", padding:"6px 12px", borderRadius:8 }}>
          {can(u,"audit_view_team")?"⚡ Bạn đang xem lịch sử nhóm của mình":"⚡ Bạn chỉ xem được lịch sử thao tác của chính mình"}
        </div>
      )}

      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Thời gian</th><th>Nhân viên</th><th>Vai trò</th><th>Thao tác</th><th>Chi tiết</th></tr></thead>
            <tbody>
              {filtered.map(entry=>(
                <tr key={entry.id}>
                  <td className="mono" style={{ color:"var(--muted)", fontSize:11 }}>{entry.time}</td>
                  <td style={{ fontWeight:600 }}>{entry.userName}</td>
                  <td><RoleBadge role={entry.role}/></td>
                  <td>
                    <span style={{ fontSize:12, fontWeight:700, color:ACTION_COLOR[entry.action]||"var(--text)" }}>
                      {entry.action}
                    </span>
                  </td>
                  <td style={{ color:"var(--muted)", fontSize:12 }}>{entry.detail}</td>
                </tr>
              ))}
              {filtered.length===0 && (
                <tr><td colSpan={5} style={{ textAlign:"center", color:"var(--muted)", padding:30 }}>Không có dữ liệu</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// USER MANAGEMENT (chỉ owner)
// ════════════════════════════════════════════════════════
function UserMgmtPage({ ctx }) {
  const { u, users, setUsers, addLog, setModal, showToast } = ctx;

  if(!can(u,"user_manage")) return <Gate perm="user_manage" user={u} />;

  const toggleActive = (id) => {
    const target = users.find(x=>x.id===id);
    if(target?.role==="owner" && users.filter(x=>x.role==="owner"&&x.active).length<=1) { showToast("Không thể khoá tài khoản Chủ duy nhất","error"); return; }
    setUsers(us=>us.map(x=>x.id===id?{...x,active:!x.active}:x));
    addLog("user_toggle", `${target?.active?"Khóa":"Mở"} tài khoản ${target?.name} (${target?.username})`);
    showToast(target?.active?"Đã khóa tài khoản":"Đã mở tài khoản");
  };

  const openForm = (usr=null) => setModal(
    <UserForm initial={usr} users={users}
      onSave={data=>{
        if(usr){ setUsers(us=>us.map(x=>x.id===usr.id?{...x,...data}:x)); addLog("user_update",`Sửa TK ${data.username} — ${ROLE_META[data.role]?.label}`); }
        else { setUsers(us=>[...us,{...data,id:uid(),active:true,createdAt:nowStr(),createdBy:u.id}]); addLog("user_create",`Tạo TK ${data.username} — ${ROLE_META[data.role]?.label}`); }
        setModal(null); showToast(usr?"Đã cập nhật TK":"Đã tạo tài khoản mới");
      }} onClose={()=>setModal(null)} />
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", justifyContent:"flex-end" }}>
        <button className="btn btn-primary" onClick={()=>openForm()}><Ic n="plus" s={14}/>Tạo tài khoản</button>
      </div>

      {/* Perm summary */}
      <div className="card" style={{ borderLeft:"3px solid var(--acc)" }}>
        <div style={{ fontWeight:700, marginBottom:10, fontSize:14 }}>🔐 Tóm tắt phân quyền</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:8 }}>
          {[
            { role:"owner",   items:["Toàn quyền tất cả","Tạo/khoá tài khoản","Xem mọi báo cáo & audit log"] },
            { role:"manager", items:["Đơn hàng: tạo, sửa, xóa","Nhập hàng & kho","Báo cáo doanh thu","Không quản lý TK"] },
            { role:"sale",    items:["Tạo đơn & thu tiền của mình","Xem tồn kho (chỉ xem)","Thêm khách hàng","Không xem báo cáo tổng"] },
          ].map(r=>(
            <div key={r.role} style={{ background:"var(--sur2)", borderRadius:8, padding:"10px 14px" }}>
              <div style={{ marginBottom:8 }}><RoleBadge role={r.role}/></div>
              {r.items.map((it,i)=><div key={i} style={{ fontSize:12, color:"var(--muted)", marginBottom:3 }}>• {it}</div>)}
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Tên đăng nhập</th><th>Họ tên</th><th>Vai trò</th><th>Trạng thái</th><th>Ngày tạo</th><th></th></tr></thead>
            <tbody>
              {users.map(usr=>(
                <tr key={usr.id}>
                  <td className="mono" style={{ fontWeight:700 }}>{usr.username}</td>
                  <td style={{ fontWeight:600 }}>{usr.name}</td>
                  <td><RoleBadge role={usr.role}/></td>
                  <td>
                    <span className={`badge ${usr.active?"badge-green":"badge-red"}`}>
                      {usr.active?"● Hoạt động":"○ Đã khóa"}
                    </span>
                  </td>
                  <td style={{ color:"var(--muted)", fontSize:12 }}>{usr.createdAt}</td>
                  <td>
                    <div style={{ display:"flex", gap:5 }}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>openForm(usr)}><Ic n="edit" s={13}/></button>
                      {usr.id!==u.id && (
                        <button className={`btn btn-xs ${usr.active?"btn-danger":"btn-yellow"}`} onClick={()=>toggleActive(usr.id)}>
                          <Ic n={usr.active?"lock":"unlock"} s={13}/>{usr.active?"Khóa":"Mở"}
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function UserForm({ initial, users, onSave, onClose }) {
  const [f, setF] = useState({
    username: initial?.username || "",
    password: initial?.password || "",
    name:     initial?.name     || "",
    role:     initial?.role     || "sale",
  });
  const s = (k,v) => setF(x=>({...x,[k]:v}));
  const [showP, setShowP] = useState(false);

  const usernameConflict = users.some(u=>u.username===f.username && u.id!==initial?.id);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h3 style={{ fontWeight:800 }}>{initial?"Sửa tài khoản":"Tạo tài khoản mới"}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label className="label">Tên đăng nhập</label>
          <input className="input" value={f.username} onChange={e=>s("username",e.target.value.trim())} placeholder="vd: sale3" />
          {usernameConflict && <div style={{ fontSize:11, color:"var(--danger)", marginTop:4 }}>⚠ Tên đăng nhập đã tồn tại</div>}
        </div>
        <div>
          <label className="label">Mật khẩu</label>
          <div style={{ position:"relative" }}>
            <input className="input" type={showP?"text":"password"} value={f.password} onChange={e=>s("password",e.target.value)} style={{ paddingRight:44 }} />
            <button onClick={()=>setShowP(v=>!v)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"var(--muted)" }}><Ic n={showP?"eyeoff":"eye"} s={16}/></button>
          </div>
        </div>
        <div>
          <label className="label">Họ và tên</label>
          <input className="input" value={f.name} onChange={e=>s("name",e.target.value)} placeholder="vd: Nguyễn Văn A" />
        </div>
        <div>
          <label className="label">Vai trò / Quyền hạn</label>
          <select className="input" value={f.role} onChange={e=>s("role",e.target.value)}>
            <option value="owner">👑 Chủ cửa hàng — Toàn quyền</option>
            <option value="manager">🧑‍💼 Quản lý — Không quản lý TK</option>
            <option value="sale">👤 Nhân viên bán hàng — Đơn của mình</option>
          </select>
          <div style={{ marginTop:8, padding:"8px 12px", background:"var(--sur2)", borderRadius:8, fontSize:12, color:"var(--muted)" }}>
            {f.role==="owner"   && "Toàn quyền: quản lý TK, báo cáo, tất cả tính năng."}
            {f.role==="manager" && "Báo cáo, nhập hàng, kho, đơn hàng — không quản lý tài khoản."}
            {f.role==="sale"    && "Chỉ tạo & xem đơn của mình, thêm khách, xem tồn kho."}
          </div>
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" disabled={!f.username||!f.password||!f.name||usernameConflict} onClick={()=>onSave(f)}>
            <Ic n="check" s={15}/>{initial?"Cập nhật":"Tạo tài khoản"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// BACKUP / RESTORE
// ════════════════════════════════════════════════════════
function BackupPage({ ctx }) {
  const { products, customers, suppliers, orders, purchases, auditLog, users, setProducts, setCusts, setSuppliers, setOrders, setPurchases, setAuditLog, setUsers, addLog, showToast } = ctx;
  const fileRef = useRef();
  const [importPreview, setImportPreview] = useState(null);
  const [lastBackup, setLastBackup] = useState(() => localStorage.getItem("sp3_last_backup") || null);

  const dataSize = (() => {
    try {
      const total = JSON.stringify({products,customers,suppliers,orders,purchases,auditLog,users}).length;
      return (total/1024).toFixed(1) + " KB";
    } catch { return "—"; }
  })();

  const stats = [
    { label:"Sản phẩm",   count: products.length },
    { label:"Khách hàng", count: customers.length },
    { label:"Nhà cung cấp", count: suppliers.length },
    { label:"Đơn hàng",   count: orders.length },
    { label:"Phiếu nhập", count: purchases.length },
    { label:"Tài khoản",  count: users.length },
    { label:"Lịch sử",    count: auditLog.length },
  ];

  // ── XUẤT FILE SAO LƯU ──
  const doBackup = () => {
    const payload = {
      _meta: { app:"SalesPro", version:"4.3", exportedAt: new Date().toISOString() },
      products, customers, suppliers, orders, purchases, auditLog, users,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
    a.href = url;
    a.download = `salespro-backup-${stamp}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    const now = new Date().toLocaleString("vi-VN");
    localStorage.setItem("sp3_last_backup", now);
    setLastBackup(now);
    addLog("report_view", `Sao lưu dữ liệu — ${dataSize}`);
    showToast("Đã tải file sao lưu");
  };

  // ── CHỌN FILE ĐỂ KHÔI PHỤC (chỉ xem trước, chưa ghi đè) ──
  const pickFile = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.products && !data.orders && !data.customers) {
          showToast("File không đúng định dạng sao lưu SalesPro","error");
          return;
        }
        setImportPreview({ data, fileName:file.name });
      } catch {
        showToast("Không đọc được file — file bị hỏng hoặc sai định dạng","error");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // ── XÁC NHẬN KHÔI PHỤC — GHI ĐÈ TOÀN BỘ ──
  const confirmRestore = () => {
    if (!importPreview) return;
    const d = importPreview.data;
    if (!window.confirm("⚠ Khôi phục sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại bằng dữ liệu trong file sao lưu.\n\nBạn có chắc chắn muốn tiếp tục?")) return;

    if (d.products)  setProducts(d.products);
    if (d.customers) setCusts(d.customers);
    if (d.suppliers) setSuppliers(d.suppliers);
    if (d.orders)    setOrders(d.orders);
    if (d.purchases) setPurchases(d.purchases);
    if (d.auditLog)  setAuditLog(d.auditLog);
    if (d.users)      setUsers(d.users);

    showToast("✓ Đã khôi phục dữ liệu thành công");
    setImportPreview(null);
    setTimeout(() => window.location.reload(), 1200);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18, maxWidth:780 }}>

      {/* Tổng quan dữ liệu hiện tại */}
      <div className="card">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <div className="section-title" style={{ margin:0 }}>📊 Dữ liệu hiện tại</div>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Dung lượng: <b style={{ color:"var(--text)" }}>{dataSize}</b></span>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))", gap:10 }}>
          {stats.map((s,i)=>(
            <div key={i} style={{ background:"var(--sur2)", borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
              <div style={{ fontSize:20, fontWeight:800, color:"var(--acc)" }}>{s.count}</div>
              <div style={{ fontSize:11, color:"var(--muted)" }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Sao lưu */}
      <div className="card">
        <div className="section-title">💾 Sao lưu dữ liệu</div>
        <p style={{ fontSize:13, color:"var(--muted)", marginBottom:14, lineHeight:1.6 }}>
          Toàn bộ dữ liệu (sản phẩm, khách hàng, nhà cung cấp, đơn hàng, phiếu nhập, tài khoản, lịch sử thao tác)
          sẽ được lưu vào <b>1 file .json</b>. Hãy lưu file này vào Google Drive, USB, hoặc email cho chính mình
          để phòng trường hợp mất dữ liệu do xóa cache trình duyệt hoặc đổi máy tính.
        </p>
        {lastBackup && (
          <div style={{ fontSize:12, color:"var(--green)", marginBottom:12 }}>
            ✓ Lần sao lưu gần nhất: <b>{lastBackup}</b>
          </div>
        )}
        <button className="btn btn-primary" onClick={doBackup}>
          <Ic n="download" s={15}/>Tải file sao lưu ngay
        </button>
      </div>

      {/* Khôi phục */}
      <div className="card">
        <div className="section-title">📂 Khôi phục dữ liệu</div>
        <p style={{ fontSize:13, color:"var(--muted)", marginBottom:14, lineHeight:1.6 }}>
          Chọn file <b>.json</b> đã sao lưu trước đó để khôi phục lại dữ liệu.
          <span style={{ color:"var(--danger)" }}> Lưu ý: thao tác này sẽ ghi đè toàn bộ dữ liệu hiện tại.</span>
        </p>
        <button className="btn btn-ghost" onClick={()=>fileRef.current.click()}>
          <Ic n="upload" s={15}/>Chọn file khôi phục
        </button>
        <input ref={fileRef} type="file" accept=".json" style={{ display:"none" }} onChange={pickFile} />

        {/* Preview trước khi ghi đè */}
        {importPreview && (
          <div style={{ marginTop:16, background:"var(--sur2)", borderRadius:10, padding:16, border:"1px solid var(--danger)33" }}>
            <div style={{ fontWeight:700, fontSize:14, marginBottom:10, color:"var(--danger)" }}>⚠ Xác nhận khôi phục</div>
            <div style={{ fontSize:13, color:"var(--muted)", marginBottom:4 }}>File: <b style={{ color:"var(--text)" }}>{importPreview.fileName}</b></div>
            {importPreview.data._meta && (
              <div style={{ fontSize:12, color:"var(--muted)", marginBottom:10 }}>
                Xuất lúc: {new Date(importPreview.data._meta.exportedAt).toLocaleString("vi-VN")}
              </div>
            )}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))", gap:8, marginBottom:14 }}>
              {[
                { l:"Sản phẩm",   v:importPreview.data.products?.length||0 },
                { l:"Khách hàng", v:importPreview.data.customers?.length||0 },
                { l:"NCC",        v:importPreview.data.suppliers?.length||0 },
                { l:"Đơn hàng",   v:importPreview.data.orders?.length||0 },
                { l:"Phiếu nhập", v:importPreview.data.purchases?.length||0 },
              ].map((x,i)=>(
                <div key={i} style={{ background:"var(--bg)", borderRadius:8, padding:"6px 10px", textAlign:"center" }}>
                  <div style={{ fontWeight:700, fontSize:14 }}>{x.v}</div>
                  <div style={{ fontSize:10, color:"var(--muted)" }}>{x.l}</div>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setImportPreview(null)}>Hủy</button>
              <button className="btn btn-danger btn-sm" onClick={confirmRestore}><Ic n="check" s={13}/>Xác nhận ghi đè & khôi phục</button>
            </div>
          </div>
        )}
      </div>

      {/* Khuyến nghị */}
      <div style={{ fontSize:12, color:"var(--muted)", background:"var(--sur2)", padding:"12px 16px", borderRadius:10, lineHeight:1.7 }}>
        💡 <b style={{ color:"var(--text)" }}>Khuyến nghị:</b> Sao lưu định kỳ mỗi tuần hoặc sau mỗi đợt nhập/xuất hàng lớn.
        Dữ liệu của SalesPro được lưu trong trình duyệt (localStorage) — nếu xóa lịch sử duyệt web,
        cài lại Windows, hoặc đổi máy tính mà chưa sao lưu, dữ liệu sẽ bị mất vĩnh viễn.
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// SHARED COMPONENTS
// ════════════════════════════════════════════════════════
function SInput({ value, onChange, placeholder }) {
  return (
    <div style={{ position:"relative", flex:1, minWidth:200 }}>
      <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)" }}><Ic n="search" s={15}/></span>
      <input className="input" style={{ paddingLeft:36 }} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} />
    </div>
  );
}

function SimpleForm({ title, fields, onSave, onClose, readOnly }) {
  const [form, setForm] = useState(Object.fromEntries(fields.map(f=>[f.key,f.value])));
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h3 style={{ fontWeight:800 }}>{title}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {fields.map(f=>(
          <div key={f.key}>
            <label className="label">{f.label}</label>
            <input className="input" value={form[f.key]} disabled={readOnly} onChange={e=>setForm(x=>({...x,[f.key]:e.target.value}))} />
          </div>
        ))}
        {!readOnly && <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={()=>onSave(form)}><Ic n="check" s={15}/>Lưu</button>
        </div>}
        {readOnly && <button className="btn btn-ghost" onClick={onClose} style={{ justifyContent:"center" }}>Đóng</button>}
      </div>
    </div>
  );
}
