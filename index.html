// REPORT
// ════════════════════════════════════════════════════════
function ReportPage({ ctx }) {
  const { u, orders, products, customers, purchases, addLog } = ctx;

  useEffect(() => {
    addLog("report_view", `Xem báo cáo doanh thu tổng hợp`);
  }, []);

  const revenue   = orders.reduce((s,o)=>s+o.total,0);
  const collected = orders.reduce((s,o)=>s+o.paid,0);
  const orderDebt = revenue-collected;
  const costGoods = purchases.reduce((s,p)=>s+p.total,0);
  const pDebt     = purchases.reduce((s,p)=>s+(p.total-p.paid),0);
  const profit    = collected-costGoods;

  const bars = [
    { label:"Tổng DT",   val:revenue,   color:"#60a5fa" },
    { label:"Đã thu",    val:collected, color:"#00d4aa" },
    { label:"Công nợ KH",val:orderDebt, color:"#f59e0b" },
    { label:"Tổng nhập", val:costGoods, color:"#a78bfa" },
    { label:"Lợi nhuận", val:profit,    color:profit>=0?"#10b981":"#f43f5e" },
  ];
  const maxBar = Math.max(...bars.map(b=>Math.abs(b.val)),1);

  const topProducts = [...products].sort((a,b)=>(b.price-b.costPrice)-(a.price-a.costPrice)).slice(0,5);
  const debtCusts = customers.map(c=>({ ...c, debt:orders.filter(o=>o.customerId===c.id).reduce((s,o)=>s+(o.total-o.paid),0) })).filter(c=>c.debt>0).sort((a,b)=>b.debt-a.debt);

  const exportXLS = () => {
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(bars.map(b=>({ "Chỉ tiêu":b.label,"Giá trị":b.val }))),"Báo cáo");
    XLSX.writeFile(wb,"bao-cao.xlsx");
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <div style={{ display:"flex", justifyContent:"flex-end" }}>
        <button className="btn btn-ghost btn-sm" onClick={exportXLS}><Ic n="excel" s={14}/>Xuất Excel</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:12 }}>
        {[
          { label:"Tổng doanh thu", val:fmt(revenue), c:"var(--info)" },
          { label:"Đã thu về",      val:fmt(collected), c:"var(--acc)" },
          { label:"Công nợ KH",     val:fmt(orderDebt), c:"var(--yellow)" },
          { label:"Nợ NCC",         val:fmt(pDebt),     c:"var(--danger)" },
          { label:"Lợi nhuận gộp",  val:fmt(profit),    c:profit>=0?"var(--green)":"var(--danger)" },
        ].map((s,i)=>(
          <div key={i} className="card" style={{ borderTop:`3px solid ${s.c}` }}>
            <div style={{ fontSize:11, color:"var(--muted)", fontWeight:600, marginBottom:6 }}>{s.label}</div>
            <div style={{ fontSize:17, fontWeight:800, color:s.c }}>{s.val}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        <div className="card">
          <div className="section-title">📊 Biểu đồ</div>
          {bars.map((b,i)=>(
            <div key={i} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:5 }}>
                <span style={{ color:"var(--muted)", fontWeight:600 }}>{b.label}</span>
                <span style={{ fontWeight:700, color:b.color }}>{fmt(b.val)}</span>
              </div>
              <div style={{ height:8, background:"var(--sur2)", borderRadius:8, overflow:"hidden" }}>
                <div style={{ width:`${(Math.abs(b.val)/maxBar*100).toFixed(1)}%`, height:"100%", background:b.color, borderRadius:8, transition:"width .5s" }} />
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="section-title">🏆 Sản phẩm lãi cao</div>
          {topProducts.map((p,i)=>(
            <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background:"var(--sur2)", borderRadius:8, marginBottom:6 }}>
              <div style={{ width:26, height:26, borderRadius:6, background:["#FFD700","#C0C0C0","#CD7F32","var(--bdr)","var(--bdr)"][i], display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, flexShrink:0 }}>{i+1}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:600, fontSize:12 }}>{p.name}</div>
                <div style={{ fontSize:11, color:"var(--muted)" }}>Tồn: {p.stock} {p.unit}</div>
              </div>
              <div style={{ color:"var(--green)", fontWeight:700, fontSize:13 }}>{fmt(p.price-p.costPrice)}</div>
            </div>
          ))}
        </div>
      </div>
      {debtCusts.length>0 && (
        <div className="card">
          <div className="section-title">⚠ Khách hàng còn nợ</div>
          <div className="table-wrap">
            <table className="table">
              <thead><tr><th>Khách hàng</th><th>ĐT</th><th>Công nợ</th></tr></thead>
              <tbody>
                {debtCusts.map(c=>(
                  <tr key={c.id}>
                    <td style={{ fontWeight:700 }}>{c.name}</td>
                    <td style={{ color:"var(--muted)" }}>{c.phone}</td>
                    <td style={{ fontWeight:800, color:"var(--danger)", fontSize:15 }}>{fmt(c.debt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

  login:"var(--info)", logout:"var(--muted)", order_create:"var(--acc)", order_delete:"var(--danger)", order_paid:"var(--green)", order_collect:"var(--green)",
  purchase_create:"var(--yellow)", purchase_delete:"var(--danger)", purchase_paid:"var(--green)",

  customer_create:"var(--acc)", customer_update:"var(--yellow)", customer_delete:"var(--danger)",
  supplier_create:"var(--acc)", supplier_update:"var(--yellow)", supplier_delete:"var(--danger)",

};

function AuditPage({ ctx }) {
  const { u, auditLog, setAuditLog } = ctx;
  const [search, setSearch] = useState("");
  const [filterUser, setFilterUser] = useState("all");

  // Phạm vi xem: owner=tất cả, manager=nhóm+mình, sale=chỉ mình
  const visible = auditLog.filter(entry => {
    if(can(u,"audit_view_all")) return true;
    if(can(u,"audit_view_team") && !can(u,"audit_view_all")) return entry.userId===u.id; // manager sees own for now
    return entry.userId===u.id;
  });

  const filtered = visible.filter(entry=>{
    const ms = entry.detail.toLowerCase().includes(search.toLowerCase()) || entry.userName.toLowerCase().includes(search.toLowerCase());
    const mu = filterUser==="all" || entry.userId===filterUser;
    return ms && mu;
  });

  const uniqueUsers = [...new Set(visible.map(e=>e.userId))].map(id=>{ const e=visible.find(x=>x.userId===id); return{ id, name:e?.userName }; });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm thao tác..." />
        {can(u,"audit_view_all") && (
          <select className="input" style={{ width:180 }} value={filterUser} onChange={e=>setFilterUser(e.target.value)}>
            <option value="all">Tất cả nhân viên</option>
            {uniqueUsers.map(uu=><option key={uu.id} value={uu.id}>{uu.name}</option>)}
          </select>
        )}
        {can(u,"audit_view_all") && <button className="btn btn-ghost btn-sm" onClick={()=>setAuditLog([])} style={{ color:"var(--danger)", borderColor:"var(--danger)" }}><Ic n="trash" s={14}/>Xóa log</button>}
      </div>

      {!can(u,"audit_view_all") && (
        <div style={{ fontSize:12, color:"var(--muted)", background:"var(--sur2)", padding:"6px 12px", borderRadius:8 }}>
          {can(u,"audit_view_team")?"⚡ Bạn đang xem lịch sử nhóm của mình":"⚡ Bạn chỉ xem được lịch sử thao tác của chính mình"}
        </div>
      )}

      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Thời gian</th><th>Nhân viên</th><th>Vai trò</th><th>Thao tác</th><th>Chi tiết</th></tr></thead>
            <tbody>
              {filtered.map(entry=>(
                <tr key={entry.id}>
                  <td className="mono" style={{ color:"var(--muted)", fontSize:11 }}>{entry.time}</td>
                  <td style={{ fontWeight:600 }}>{entry.userName}</td>
                  <td><RoleBadge role={entry.role}/></td>
                  <td>
                    <span style={{ fontSize:12, fontWeight:700, color:ACTION_COLOR[entry.action]||"var(--text)" }}>
                      {entry.action}
                    </span>
                  </td>
                  <td style={{ color:"var(--muted)", fontSize:12 }}>{entry.detail}</td>
                </tr>
              ))}
              {filtered.length===0 && (
                <tr><td colSpan={5} style={{ textAlign:"center", color:"var(--muted)", padding:30 }}>Không có dữ liệu</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// USER MANAGEMENT (chỉ owner)
// ════════════════════════════════════════════════════════
function UserMgmtPage({ ctx }) {
  const { u, users, setUsers, addLog, setModal, showToast } = ctx;

  if(!can(u,"user_manage")) return <Gate perm="user_manage" user={u} />;

  const toggleActive = (id) => {
    const target = users.find(x=>x.id===id);
    if(target?.role==="owner" && users.filter(x=>x.role==="owner"&&x.active).length<=1) { showToast("Không thể khoá tài khoản Chủ duy nhất","error"); return; }
    setUsers(us=>us.map(x=>x.id===id?{...x,active:!x.active}:x));
    addLog("user_toggle", `${target?.active?"Khóa":"Mở"} tài khoản ${target?.name} (${target?.username})`);
    showToast(target?.active?"Đã khóa tài khoản":"Đã mở tài khoản");
  };

  const openForm = (usr=null) => setModal(
    <UserForm initial={usr} users={users}
      onSave={data=>{
        if(usr){ setUsers(us=>us.map(x=>x.id===usr.id?{...x,...data}:x)); addLog("user_update",`Sửa TK ${data.username} — ${ROLE_META[data.role]?.label}`); }
        else { setUsers(us=>[...us,{...data,id:uid(),active:true,createdAt:nowStr(),createdBy:u.id}]); addLog("user_create",`Tạo TK ${data.username} — ${ROLE_META[data.role]?.label}`); }
        setModal(null); showToast(usr?"Đã cập nhật TK":"Đã tạo tài khoản mới");
      }} onClose={()=>setModal(null)} />
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", justifyContent:"flex-end" }}>
        <button className="btn btn-primary" onClick={()=>openForm()}><Ic n="plus" s={14}/>Tạo tài khoản</button>
      </div>

      {/* Perm summary */}
      <div className="card" style={{ borderLeft:"3px solid var(--acc)" }}>
        <div style={{ fontWeight:700, marginBottom:10, fontSize:14 }}>🔐 Tóm tắt phân quyền</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:8 }}>
          {[
            { role:"owner",   items:["Toàn quyền tất cả","Tạo/khoá tài khoản","Xem mọi báo cáo & audit log"] },
            { role:"manager", items:["Đơn hàng: tạo, sửa, xóa","Nhập hàng & kho","Báo cáo doanh thu","Không quản lý TK"] },
            { role:"sale",    items:["Tạo đơn & thu tiền của mình","Xem tồn kho (chỉ xem)","Thêm khách hàng","Không xem báo cáo tổng"] },
          ].map(r=>(
            <div key={r.role} style={{ background:"var(--sur2)", borderRadius:8, padding:"10px 14px" }}>
              <div style={{ marginBottom:8 }}><RoleBadge role={r.role}/></div>
              {r.items.map((it,i)=><div key={i} style={{ fontSize:12, color:"var(--muted)", marginBottom:3 }}>• {it}</div>)}
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{ padding:0 }}>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Tên đăng nhập</th><th>Họ tên</th><th>Vai trò</th><th>Trạng thái</th><th>Ngày tạo</th><th></th></tr></thead>
            <tbody>
              {users.map(usr=>(
                <tr key={usr.id}>
                  <td className="mono" style={{ fontWeight:700 }}>{usr.username}</td>
                  <td style={{ fontWeight:600 }}>{usr.name}</td>
                  <td><RoleBadge role={usr.role}/></td>
                  <td>
                    <span className={`badge ${usr.active?"badge-green":"badge-red"}`}>
                      {usr.active?"● Hoạt động":"○ Đã khóa"}
                    </span>
                  </td>
                  <td style={{ color:"var(--muted)", fontSize:12 }}>{usr.createdAt}</td>
                  <td>
                    <div style={{ display:"flex", gap:5 }}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>openForm(usr)}><Ic n="edit" s={13}/></button>
                      {usr.id!==u.id && (
                        <button className={`btn btn-xs ${usr.active?"btn-danger":"btn-yellow"}`} onClick={()=>toggleActive(usr.id)}>
                          <Ic n={usr.active?"lock":"unlock"} s={13}/>{usr.active?"Khóa":"Mở"}
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function UserForm({ initial, users, onSave, onClose }) {
  const [f, setF] = useState({
    username: initial?.username || "",
    password: initial?.password || "",
    name:     initial?.name     || "",
    role:     initial?.role     || "sale",
  });
  const s = (k,v) => setF(x=>({...x,[k]:v}));
  const [showP, setShowP] = useState(false);

  const usernameConflict = users.some(u=>u.username===f.username && u.id!==initial?.id);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h3 style={{ fontWeight:800 }}>{initial?"Sửa tài khoản":"Tạo tài khoản mới"}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label className="label">Tên đăng nhập</label>
          <input className="input" value={f.username} onChange={e=>s("username",e.target.value.trim())} placeholder="vd: sale3" />
          {usernameConflict && <div style={{ fontSize:11, color:"var(--danger)", marginTop:4 }}>⚠ Tên đăng nhập đã tồn tại</div>}
        </div>
        <div>
          <label className="label">Mật khẩu</label>
          <div style={{ position:"relative" }}>
            <input className="input" type={showP?"text":"password"} value={f.password} onChange={e=>s("password",e.target.value)} style={{ paddingRight:44 }} />
            <button onClick={()=>setShowP(v=>!v)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"var(--muted)" }}><Ic n={showP?"eyeoff":"eye"} s={16}/></button>
          </div>
        </div>
        <div>
          <label className="label">Họ và tên</label>
          <input className="input" value={f.name} onChange={e=>s("name",e.target.value)} placeholder="vd: Nguyễn Văn A" />
        </div>
        <div>
          <label className="label">Vai trò / Quyền hạn</label>
          <select className="input" value={f.role} onChange={e=>s("role",e.target.value)}>
            <option value="owner">👑 Chủ cửa hàng — Toàn quyền</option>
            <option value="manager">🧑‍💼 Quản lý — Không quản lý TK</option>
            <option value="sale">👤 Nhân viên bán hàng — Đơn của mình</option>
          </select>
          <div style={{ marginTop:8, padding:"8px 12px", background:"var(--sur2)", borderRadius:8, fontSize:12, color:"var(--muted)" }}>
            {f.role==="owner"   && "Toàn quyền: quản lý TK, báo cáo, tất cả tính năng."}
            {f.role==="manager" && "Báo cáo, nhập hàng, kho, đơn hàng — không quản lý tài khoản."}
            {f.role==="sale"    && "Chỉ tạo & xem đơn của mình, thêm khách, xem tồn kho."}
          </div>
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" disabled={!f.username||!f.password||!f.name||usernameConflict} onClick={()=>onSave(f)}>
            <Ic n="check" s={15}/>{initial?"Cập nhật":"Tạo tài khoản"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// SHARED COMPONENTS
// ════════════════════════════════════════════════════════
function SInput({ value, onChange, placeholder }) {
  return (
    <div style={{ position:"relative", flex:1, minWidth:200 }}>
      <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)" }}><Ic n="search" s={15}/></span>
      <input className="input" style={{ paddingLeft:36 }} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} />
    </div>
  );
}

function SimpleForm({ title, fields, onSave, onClose, readOnly }) {
  const [form, setForm] = useState(Object.fromEntries(fields.map(f=>[f.key,f.value])));
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h3 style={{ fontWeight:800 }}>{title}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {fields.map(f=>(
          <div key={f.key}>
            <label className="label">{f.label}</label>
            <input className="input" value={form[f.key]} disabled={readOnly} onChange={e=>setForm(x=>({...x,[f.key]:e.target.value}))} />
          </div>
        ))}
        {!readOnly && <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={()=>onSave(form)}><Ic n="check" s={15}/>Lưu</button>
        </div>}
        {readOnly && <button className="btn btn-ghost" onClick={onClose} style={{ justifyContent:"center" }}>Đóng</button>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));root.render(<App/>);
</script></body></html>
