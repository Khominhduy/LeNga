function can(user, perm) {
  if (!user) return false;

  return PERMS[perm]?.[idx] ?? false;
}

function useLS(key, def) {
  const [v, sv] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  const set = useCallback((upd) => {
    sv(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [v, set];
}

// ════════════════════════════════════════════════════════
// TÌM KIẾM THÔNG MINH (hỗ trợ viết tắt chữ cái đầu)
// VD: "bghs" tìm ra "Bàn Ghế Học Sinh"
// ════════════════════════════════════════════════════════
function removeVietnameseAccents(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D");
}

function makeAcronym(text) {
  return removeVietnameseAccents(String(text||""))
    .toLowerCase()
    .split(/\s+/)
    .filter(w=>w.length>0 && /[a-z]/i.test(w[0]))
    .map(w=>w[0])
    .join("");
}

function smartMatch(text, query) {
  if (!query || !query.trim()) return true;
  const q = query.trim().toLowerCase();
  const t = String(text||"").toLowerCase();
  // 1. Tìm thường (bao gồm cả không dấu)
  if (t.includes(q)) return true;
  if (removeVietnameseAccents(t).includes(removeVietnameseAccents(q))) return true;
  // 2. Tìm theo viết tắt chữ cái đầu (acronym)
  const acronym = makeAcronym(text);
  const qClean = removeVietnameseAccents(q).replace(/[^a-z0-9]/g,"");
  if (acronym && qClean && acronym.includes(qClean)) return true;
  return false;
}

function LoginPage({ users, onLogin }) {
  const [uname, setUname] = useState("");
  const [pass, setPass] = useState("");
  const [showP, setShowP] = useState(false);
  const [err, setErr] = useState("");

  const submit = () => {
    const found = users.find(u => u.username === uname && u.password === pass);
    if (!found) { setErr("Sai tên đăng nhập hoặc mật khẩu!"); return; }
    if (!found.active) { setErr("Tài khoản đã bị khóa. Liên hệ Chủ cửa hàng!"); return; }
    onLogin(found);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"var(--bg)", padding:16 }}>
      <div style={{ width:"100%", maxWidth:380 }} className="fade-in">
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:60, height:60, background:"linear-gradient(135deg,#00d4aa,#0055ff)", borderRadius:18, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 14px" }}>
            <Ic n="shield" s={28} />
          </div>
          <div style={{ fontSize:26, fontWeight:800, color:"var(--acc)" }}>SalesPro v4</div>

        </div>
        <div className="card" style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div>
            <label className="label">Tên đăng nhập</label>
            <input className="input" value={uname} onChange={e=>setUname(e.target.value)} placeholder="owner / manager / sale1" onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>
          <div>
            <label className="label">Mật khẩu</label>
            <div style={{ position:"relative" }}>
              <input className="input" type={showP?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} style={{ paddingRight:44 }} />
              <button onClick={()=>setShowP(v=>!v)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"var(--muted)" }}>
                <Ic n={showP?"eyeoff":"eye"} s={16} />
              </button>
            </div>
          </div>
          {err && <div style={{ color:"var(--danger)", fontSize:13, background:"#f43f5e11", padding:"8px 12px", borderRadius:8 }}>⚠ {err}</div>}
          <button className="btn btn-primary" style={{ width:"100%", justifyContent:"center", padding:12 }} onClick={submit}>
            <Ic n="key" s={16} />Đăng nhập
          </button>

          {/* Demo accounts */}
          <div style={{ borderTop:"1px solid var(--bdr)", paddingTop:14 }}>
            <div className="label" style={{ marginBottom:10 }}>Tài khoản demo</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {[
                { role:"owner",   user:"owner",   pass:"owner123",   label:"👑 Chủ cửa hàng" },
                { role:"manager", user:"manager", pass:"manager123", label:"🧑‍💼 Quản lý" },
                { role:"sale",    user:"sale1",   pass:"sale123",    label:"👤 Nhân viên BH" },
              ].map(a => (
                <button key={a.role} className="btn btn-ghost btn-sm" style={{ justifyContent:"flex-start", gap:8 }}

  );

  const [users,      setUsers]     = useLS("sp3_users",     SEED_USERS);
  const [products,   setProducts]  = useLS("sp3_products",  SEED_DATA.products);
  const [customers,  setCusts]     = useLS("sp3_customers", SEED_DATA.customers);
  const [suppliers,  setSuppliers] = useLS("sp3_suppliers", SEED_DATA.suppliers);
  const [orders,     setOrders]    = useLS("sp3_orders",    SEED_DATA.orders);
  const [purchases,  setPurchases] = useLS("sp3_purchases", SEED_DATA.purchases);
  const [auditLog,   setAuditLog]  = useLS("sp3_audit",     SEED_DATA.auditLog);

  const [page,      setPage]    = useState("dashboard");
  const [sideOpen,  setSideOpen] = useState(true);
  const [modal,     setModal]   = useState(null);
  const [printOrder,setPO]      = useState(null);
  const [toast,     setToast]   = useState(null);
  const [selectedOrderId, setSelectedOrderId]       = useState(null);
  const [selectedCustomerId, setSelectedCustomerId] = useState(null);

  // Draft storage: per-user key
  const draftKey = currentUser ? `sp3_draft_${currentUser.id}` : null;

  const addLog = useCallback((action, detail) => {
    if (!currentUser) return;
    setAuditLog(prev => [makeAuditEntry(currentUser, action, detail), ...prev].slice(0, 500));
  }, [currentUser, setAuditLog]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const login = (u) => {
    localStorage.setItem("sp3_session", JSON.stringify(u));
    setCurrentUser(u);
    // log after state set (next tick)
    setTimeout(() => {
      setAuditLog(prev => [makeAuditEntry(u, "login", `Đăng nhập từ ${navigator.userAgent.includes("Mobile")?"mobile":"desktop"}`), ...prev].slice(0, 500));
    }, 0);
  };

  const logout = () => {
    addLog("logout", "Đăng xuất khỏi hệ thống");
    localStorage.removeItem("sp3_session");
    setCurrentUser(null);
  };

  const reset = () => {
    ["sp3_users","sp3_products","sp3_customers","sp3_suppliers","sp3_orders","sp3_purchases","sp3_audit"].forEach(k=>localStorage.removeItem(k));
    setUsers(SEED_USERS); setProducts(SEED_DATA.products); setCusts(SEED_DATA.customers);
    setSuppliers(SEED_DATA.suppliers); setOrders(SEED_DATA.orders);
    setPurchases(SEED_DATA.purchases); setAuditLog(SEED_DATA.auditLog);
    showToast("Đã khôi phục dữ liệu mẫu");
  };

  // Sync currentUser with users list (e.g. if name/role changed)
  useEffect(() => {
    if (!currentUser) return;
    const updated = users.find(u => u.id === currentUser.id);
    if (updated && (updated.name !== currentUser.name || updated.role !== currentUser.role)) {
      const next = { ...currentUser, name: updated.name, role: updated.role };
      localStorage.setItem("sp3_session", JSON.stringify(next));
      setCurrentUser(next);
    }
    if (updated && !updated.active) logout();
  }, [users]);

  if (!currentUser) return <><style>{CSS}</style><LoginPage users={users} onLogin={login} /></>;

  const u = currentUser;

  const nav = [
    { id:"dashboard", label:"Tổng quan",        icon:"home",   perm:null },
    { id:"orders",    label:"Đơn hàng",          icon:"cart",   perm:null },
    { id:"purchases", label:"Nhập hàng",         icon:"truck",  perm:"purchase_view" },
    { id:"products",  label:"Sản phẩm / Kho",    icon:"box",    perm:"product_view" },
    { id:"customers", label:"Khách hàng",         icon:"users",  perm:"customer_view" },
    { id:"suppliers", label:"Nhà cung cấp",       icon:"truck",  perm:"supplier_view" },
    { id:"report",    label:"Báo cáo",            icon:"bar",    perm:"report_view" },
    { id:"audit",     label:"Lịch sử thao tác",   icon:"log",    perm:"audit_view_own" },
    { id:"usermgmt",  label:"Quản lý tài khoản",  icon:"shield", perm:"user_manage" },
    { id:"backup",    label:"Sao lưu dữ liệu",    icon:"save",   perm:"user_manage" },
  ].filter(n => !n.perm || can(u, n.perm));

  const ctx = { u, can, users, setUsers, products, setProducts, customers, setCusts, suppliers, setSuppliers, orders, setOrders, purchases, setPurchases, auditLog, setAuditLog, addLog, setModal, showToast, setPO, draftKey };

  const printInvoice = (order) => {
    const cust = customers.find(c => c.id === order.customerId) || {};
    const f = (n) => new Intl.NumberFormat("vi-VN").format(n || 0);
    const totalQty = (order.items||[]).reduce((s,it) => s + it.qty, 0);
    const now = new Date();
    const printDate = `${String(now.getDate()).padStart(2,"0")}-${String(now.getMonth()+1).padStart(2,"0")}-${now.getFullYear()}`;
    const qrUrl = `https://img.vietqr.io/image/MB-0982228882-compact2.png?amount=${order.total}&addInfo=${encodeURIComponent("TT "+order.code)}&accountName=LE%20HANG%20NGA`;

    const rows = (order.items||[]).map((it,i) => `
      <tr>
        <td style="text-align:center">${i+1}</td>
        <td>${it.productName||""}</td>
        <td style="text-align:center">${it.unit||""}</td>
        <td style="text-align:center">${it.qty||0}</td>
        <td style="text-align:right">${f(it.price)}</td>
        <td style="text-align:right">${f((it.qty||0)*(it.price||0))}</td>
      </tr>`).join("");

    const html = `<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/>
<title>Hóa đơn ${order.code}</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  .header .company{font-size:15px;font-weight:800;}
  .title-box{text-align:center;border-top:1.5px solid #000;border-bottom:1.5px solid #000;padding:6px 0;margin:8px 0 10px;}
  .title-box h2{font-size:18px;font-weight:800;letter-spacing:1px;margin-bottom:2px;}
  .cust-info{margin-bottom:10px;line-height:1.8;}
  table{width:100%;border-collapse:collapse;margin-bottom:6px;}
  th,td{border:1px solid #333;padding:5px 7px;font-size:12px;}
  thead th{background:#f0f0f0;text-align:center;font-weight:700;}
  .total-row td{font-weight:800;font-size:13px;}
  .sigs{display:flex;justify-content:space-between;align-items:flex-end;margin-top:24px;}
  .sig-box{text-align:center;width:30%;}
  .sig-line{border-top:1px dashed #999;margin-top:56px;padding-top:4px;}
  .sig-center{text-align:center;width:36%;}
  .qr-img{width:90px;height:90px;object-fit:contain;display:block;margin:4px auto 0;}
  .napas{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:3px;font-size:10px;font-weight:800;}
  @media print{body{padding:10px 20px;}}
</style>
</head><body>
<div class="header">
  <div class="company">Công ty Nội Thất Gỗ Minh Duy</div>
  <div><i>Showroom: 1065 Đê La Thành, Ngọc Khánh, Ba Đình, Hà Nội</i></div>
  <div>ĐT/Zalo 034.920.9944- 098.222.8882</div>
  <div><i>Xuất kho: 59/61 Tiến Thành - Hà Đông - Hà Nội</i></div>
  <div>TK: Lê Hằng Nga-0982228882-MB-NH TMCP Quân đội</div>
</div>
<div class="title-box">
  <h2>HOÁ ĐƠN BÁN HÀNG</h2>
  <div>Số HD: <b>${order.code}</b></div>
</div>
<div class="cust-info">
  <div>Tên khách hàng: <b>${order.customerName||""}</b></div>
  <div>Địa chỉ : ${cust.address||"—"}</div>
  <div>Điện thoại: ${cust.phone||"—"}</div>
</div>
<table>
  <thead>
    <tr>
      <th style="width:28px">STT</th>
      <th>Sản phẩm</th>
      <th style="width:55px">Đơn vị</th>
      <th style="width:35px">SL</th>
      <th style="width:90px">Đơn giá</th>
      <th style="width:98px">Thành tiền</th>
    </tr>
  </thead>
  <tbody>
    ${rows}
    <tr class="total-row">
      <td colspan="3" style="text-align:right;font-weight:800">Tổng</td>
      <td style="text-align:center;font-weight:800">${totalQty}</td>
      <td></td>
      <td style="text-align:right;font-weight:800">${f(order.total)}</td>
    </tr>
  </tbody>
</table>
<div class="sigs">
  <div class="sig-box">
    <div><i>Người mua hàng</i></div>
    <div class="sig-line">&nbsp;</div>
  </div>
  <div class="sig-center">
    <div><i>Người vận chuyển</i></div>
    <img class="qr-img" src="${qrUrl}" alt="QR thanh toán"/>
    <div class="napas">
      <span style="color:#e05">napas</span><span style="color:#005baa">247</span>
      <span style="color:#e05">⚡</span><span style="color:#005baa">MSB</span>
    </div>
  </div>
  <div class="sig-box">
    <div><b>Ngày: ${printDate}</b></div>
    <div style="font-size:11px;font-weight:700;margin-top:2px">LE HANG NGA MSB</div>
    <div class="sig-line">&nbsp;</div>
  </div>
</div>
<script>window.onload=()=>{window.print();setTimeout(()=>window.close(),800);}<\/script>
</body></html>`;

    const w = window.open("","_blank","width=700,height=900");
    w.document.write(html);
    w.document.close();
  };

  return (
    <>
      <style>{CSS}</style>

      {/* TOAST */}
      {toast && (
        <div className="toast-enter" style={{ position:"fixed", bottom:24, right:24, zIndex:9999, background: toast.type==="success"?"var(--acc)":"var(--danger)", color:"#0e1016", padding:"10px 20px", borderRadius:10, fontWeight:700, fontSize:13, boxShadow:"0 8px 24px #00000055" }}>
          {toast.type==="success"?"✓ ":"✕ "}{toast.msg}
        </div>
      )}

      {modal && (
        <div className="modal-bg">
          <div className="modal fade-in" onClick={e=>e.stopPropagation()}>{modal}</div>
        </div>
      )}

      <div style={{ display:"flex", minHeight:"100vh" }}>
        {/* SIDEBAR */}
        <div style={{ width:sideOpen?224:0, minWidth:sideOpen?224:0, background:"var(--sur)", borderRight:"1px solid var(--bdr)", display:"flex", flexDirection:"column", overflow:"hidden", transition:"all 0.2s", position:"sticky", top:0, height:"100vh" }}>
          <div style={{ padding:"18px 14px 14px", borderBottom:"1px solid var(--bdr)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:36, height:36, background:"linear-gradient(135deg,#00d4aa,#0055ff)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <Ic n="shield" s={18} />
              </div>
              <div>
                <div style={{ fontWeight:800, fontSize:14, color:"var(--acc)" }}>SalesPro</div>
                <div style={{ fontSize:10, color:"var(--muted)" }}>v3 — Phân quyền 3 cấp</div>
              </div>
            </div>
          </div>

          <div style={{ flex:1, overflowY:"auto", padding:"10px 10px", display:"flex", flexDirection:"column", gap:2 }}>
            {nav.map(n => (
              <div key={n.id} className={`nav-item${page===n.id?" active":""}`}
                onClick={()=>{ setPage(n.id); if(window.innerWidth<768) setSideOpen(false); }}>
                <Ic n={n.icon} s={16} />{n.label}
              </div>
            ))}
          </div>

          <div style={{ padding:"12px 10px", borderTop:"1px solid var(--bdr)" }}>
            {/* Current user info */}
            <div style={{ padding:"8px 14px", marginBottom:4, background:"var(--sur2)", borderRadius:8 }}>
              <div style={{ fontWeight:700, fontSize:13, marginBottom:3 }}>{u.name}</div>
              <RoleBadge role={u.role} />
            </div>
            <div className="nav-item" style={{ fontSize:12 }} onClick={reset}><Ic n="refresh" s={14} />Reset demo</div>
            <div className="nav-item" style={{ color:"var(--danger)" }} onClick={logout}><Ic n="logout" s={16} />Đăng xuất</div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0 }}>
          {/* TOPBAR */}
          <div style={{ background:"var(--sur)", borderBottom:"1px solid var(--bdr)", padding:"0 20px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <button className="btn btn-ghost btn-sm" style={{ padding:"6px 8px" }} onClick={()=>setSideOpen(v=>!v)}><Ic n="menu" s={18} /></button>
              <span style={{ fontWeight:700, fontSize:15 }}>{nav.find(n=>n.id===page)?.label}</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span className="hide-mobile" style={{ fontSize:12, color:"var(--muted)" }}>{todayStr()}</span>
              <RoleBadge role={u.role} />
            </div>
          </div>

          {/* PAGE */}
          <div style={{ flex:1, overflowY:"auto", padding:20 }} className="fade-in" key={page}>
            {page==="dashboard"        && <Dashboard ctx={ctx} setPage={setPage} setSelectedOrderId={setSelectedOrderId} setSelectedCustomerId={setSelectedCustomerId} />}
            {page==="orders"           && <OrdersPage ctx={ctx} printInvoice={printInvoice} setPage={setPage} setSelectedOrderId={setSelectedOrderId} setSelectedCustomerId={setSelectedCustomerId} />}
            {page==="order_detail"     && <OrderDetailPage ctx={ctx} orderId={selectedOrderId} setPage={setPage} setSelectedCustomerId={setSelectedCustomerId} printInvoice={printInvoice} />}
            {page==="customer_detail"  && <CustomerDetailPage ctx={ctx} customerId={selectedCustomerId} setPage={setPage} setSelectedOrderId={setSelectedOrderId} />}
            {page==="purchases"        && <PurchasesPage ctx={ctx} />}
            {page==="products"         && <ProductsPage ctx={ctx} />}
            {page==="customers"        && <CustomersPage ctx={ctx} setPage={setPage} setSelectedCustomerId={setSelectedCustomerId} />}
            {page==="suppliers"        && <SuppliersPage ctx={ctx} />}
            {page==="report"           && <ReportPage ctx={ctx} />}
            {page==="audit"            && <AuditPage ctx={ctx} />}
            {page==="usermgmt"         && <UserMgmtPage ctx={ctx} />}
            {page==="backup"           && <BackupPage ctx={ctx} />}
          </div>
        </div>
      </div>
    </>
  );
}

// ════════════════════════════════════════════════════════
// PERMISSION GATE
// ════════════════════════════════════════════════════════
function Gate({ perm, user, fallback = null, children }) {
  if (can(user, perm)) return children;
  if (fallback) return fallback;
  return (
    <div className="perm-denied">
      <Ic n="lock" s={40} />
      <div style={{ fontWeight:700, fontSize:16, color:"var(--text)" }}>Không có quyền truy cập</div>
      <div style={{ fontSize:13 }}>Chức năng này yêu cầu quyền cao hơn. Liên hệ Chủ cửa hàng.</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
function Dashboard({ ctx, setPage, setSelectedOrderId, setSelectedCustomerId }) {
  const { u, orders, products, customers, purchases } = ctx;
  const myOrders = can(u,"order_view_all") ? orders : orders.filter(o=>o.createdBy===u.id);
  const revenue  = myOrders.reduce((s,o)=>s+o.total, 0);
  const debt     = myOrders.reduce((s,o)=>s+(o.isPaid?0:o.total), 0);
  const pDebt    = can(u,"purchase_view") ? purchases.reduce((s,p)=>s+(p.total-p.paid),0) : null;
  const lowStock = products.filter(p=>p.stock<50);

  const pendingOrders = myOrders.filter(o=>!o.approved);
  const recentOrders  = [...myOrders].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  const goOrder = (oid) => { setSelectedOrderId(oid); setPage("order_detail"); };
  const goCust  = (cid) => { setSelectedCustomerId(cid); setPage("customer_detail"); };

  const stats = [
    { label: can(u,"order_view_all")?"Doanh thu (tất cả)":"Doanh thu (của tôi)", val:fmt(revenue), color:"var(--acc)" },
    { label: "Công nợ KH",    val:fmt(debt),  color:"var(--yellow)" },
    ...(pDebt!==null?[{ label:"Nợ NCC", val:fmt(pDebt), color:"var(--info)" }]:[]),
    { label: "Kho sắp hết",   val:lowStock.length+" SP", color:"var(--danger)" },
  ];

  const OrderTable = ({ rows, showApprove }) => (
    <div className="table-wrap">
      <table className="table">
        <thead><tr>
          <th>Mã đơn</th><th>Khách hàng</th><th>Giá trị</th><th>NV tạo</th><th>TT</th>
        </tr></thead>
        <tbody>
          {rows.length===0 && <tr><td colSpan={5} style={{ textAlign:"center", color:"var(--muted)", padding:20, fontSize:12 }}>Không có đơn nào</td></tr>}
          {rows.map(o=>(
            <tr key={o.id}>
              <td><a className="link" onClick={()=>goOrder(o.id)}>{o.code}</a></td>
              <td><a className="link-name" onClick={()=>goCust(o.customerId)}>{o.customerName}</a></td>
              <td style={{ fontWeight:700 }}>{fmt(o.total)}</td>
              <td style={{ color:"var(--muted)", fontSize:12 }}>{o.createdByName}</td>
              <td><StatusBadge status={o.status}/></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* Stats row — 4 card đều nhau */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
        {stats.map((s,i)=>(
          <div key={i} className="card" style={{ borderLeft:`3px solid ${s.color}`, padding:"14px 16px" }}>
            <div style={{ fontSize:11, color:"var(--muted)", fontWeight:600, marginBottom:4 }}>{s.label}</div>
            <div style={{ fontSize:18, fontWeight:800, color:s.color }}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* Main layout: 2 bảng trái | kho phải — cột kho thẳng hàng với stat card thứ 4 */}
      <div style={{ display:"grid", gridTemplateColumns:"3fr 1fr", gap:12, alignItems:"start" }}>

        {/* LEFT: 2 bảng đơn */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {/* Đơn chờ duyệt */}
          <div className="card" style={{ padding:0 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 18px", borderBottom:"1px solid var(--bdr)" }}>
              <span style={{ fontWeight:700, fontSize:14 }}>📋 Đơn chờ duyệt</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>setPage("orders")}>Xem tất cả</button>
            </div>
            <OrderTable rows={pendingOrders} />
          </div>
          {/* Đơn gần đây */}
          <div className="card" style={{ padding:0 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 18px", borderBottom:"1px solid var(--bdr)" }}>
              <span style={{ fontWeight:700, fontSize:14 }}>📦 Đơn gần đây</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>setPage("orders")}>Xem tất cả</button>
            </div>
            <OrderTable rows={recentOrders} />
          </div>
        </div>

        {/* RIGHT: Kho sắp hết — cùng chiều rộng với stat card "Kho sắp hết", kéo dài xuống */}
        <div className="card" style={{ padding:"14px 16px", position:"sticky", top:16 }}>
          <div style={{ fontWeight:700, fontSize:14, marginBottom:10 }}>⚠ Kho sắp hết</div>
          {lowStock.length===0 && <div style={{ color:"var(--muted)", fontSize:13 }}>Kho ổn định ✓</div>}
          <div style={{ display:"flex", flexDirection:"column", gap:6, maxHeight:"calc(100vh - 220px)", overflowY:"auto" }}>
            {lowStock.map(p=>(
              <div key={p.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 10px", background:"var(--sur2)", borderRadius:8 }}>
                <div style={{ minWidth:0, flex:1, marginRight:8 }}>
                  <div style={{ fontWeight:600, fontSize:12, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.name}</div>
                  <div style={{ fontSize:10, color:"var(--muted)" }}>{p.code}</div>
                </div>
                <span className={`badge ${p.stock<30?"badge-red":"badge-yellow"}`} style={{ flexShrink:0 }}>{p.stock}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// ORDERS
// ════════════════════════════════════════════════════════
function OrdersPage({ ctx, printInvoice, setPage, setSelectedOrderId, setSelectedCustomerId }) {
  const { u, orders, setOrders, customers, setCusts, products, setProducts, addLog, setModal, showToast } = ctx;
  const [search, setSearch] = useState("");

  const visibleOrders = can(u,"order_view_all") ? orders : orders.filter(o=>o.createdBy===u.id);
  const matchSearch = (o) => smartMatch(o.code,search) || smartMatch(o.customerName,search);

  // Tách 2 nhóm — pending sắp theo địa chỉ (TP > đường > số nhà)
  const pending  = visibleOrders.filter(o=>!o.approved && matchSearch(o)).sort((a,b) => {
    const ca = customers.find(x=>x.id===a.customerId);
    const cb = customers.find(x=>x.id===b.customerId);
    return (ca?.address||"").localeCompare(cb?.address||"","vi");
  });
  const exported = visibleOrders.filter(o=> o.approved && matchSearch(o));

  // ===== ACTIONS =====
  const approveOrder = (id) => {
    const o = orders.find(x=>x.id===id); if(!o) return;
    setProducts(ps=>ps.map(p=>{ const it=o.items.find(i=>i.productId===p.id); return it?{...p,stock:Math.max(0,p.stock-it.qty)}:p; }));
    setOrders(os=>os.map(x=>x.id===id?{...x,approved:true,approvedAt:nowStr(),approvedBy:u.id}:x));
    addLog("order_approve",`Duyệt & xuất kho đơn ${o.code} — ${fmt(o.total)}`);
    showToast("Đã duyệt — đã trừ tồn kho");
  };

  const toggleDelivered = (id) => {
    const o = orders.find(x=>x.id===id); if(!o) return;
    const next = !o.delivered;
    if(!window.confirm(next ? `Xác nhận đã giao đơn ${o.code} cho ${o.customerName}?` : `Hoàn tác giao hàng đơn ${o.code}?`)) return;
    setOrders(os=>os.map(x=>x.id===id?{...x,delivered:next, deliveredAt: next?nowStr():null}:x));
    addLog(next?"order_delivered":"order_undelivered", `${next?"Xác nhận đã giao":"Hoàn tác giao"} đơn ${o.code}`);
    showToast(next?"Đã giao hàng":"Chuyển về chưa giao");
  };

  const toggleReturned = (id) => {
    const o = orders.find(x=>x.id===id); if(!o) return;
    if(o.returned) {
      // Hủy trả hàng
      if(!window.confirm(`Hủy trả hàng đơn ${o.code}?`)) return;
      setOrders(os=>os.map(x=>x.id===id?{...x,returned:false,returnReason:"",returnItems:null}:x));
      setProducts(ps=>ps.map(p=>{ const it=o.items.find(i=>i.productId===p.id); return it?{...p,stock:Math.max(0,p.stock-it.qty)}:p; }));
      addLog("order_returned",`Hủy trả hàng đơn ${o.code}`);
      showToast("Hủy trả hàng");
    } else {
      // Mở modal nhập thông tin trả
      setModal(
        <ReturnForm order={o} products={products} onConfirm={(reason, returnItems) => {
          setOrders(os=>os.map(x=>x.id===id?{...x,returned:true,returnReason:reason,returnItems}:x));
          // Hoàn kho: cả SP của đơn lẫn SP bổ sung nhập thêm
          setProducts(ps=>ps.map(p=>{
            const it = returnItems.find(i=>i.productId===p.id);
            return it ? {...p, stock: p.stock + it.qty} : p;
          }));
          addLog("order_returned",`Đánh dấu trả hàng đơn ${o.code} — Lý do: ${reason}`);
          setModal(null); showToast("Đã đánh dấu trả hàng (hoàn kho)");
        }} onClose={()=>setModal(null)} />
      );
    }
  };

  const togglePaid = (id) => {
    const o = orders.find(x=>x.id===id); if(!o) return;
    // Chỉ owner mới được xác nhận thanh toán
    if(u.role !== "owner"){ showToast("Chỉ Chủ cửa hàng mới được xác nhận thanh toán","error"); return; }
    const next = !o.isPaid;
    if(!window.confirm(next ? `Xác nhận đã thu tiền đơn ${o.code} — ${fmt(o.total)}?` : `Hủy thanh toán đơn ${o.code}?`)) return;
    setOrders(os=>os.map(x=>x.id===id?{...x,isPaid:next, paid: next?x.total:0, status: next?"paid":"unpaid"}:x));
    addLog(next?"order_paid":"order_unpaid", `${next?"Thu tiền":"Hủy thanh toán"} đơn ${o.code}`);
    showToast(next?"Đã thanh toán":"Đã hủy thanh toán");
  };

  const deleteOrder = (id) => {
    const o = orders.find(x=>x.id===id); if(!o) return;
    if(!window.confirm(`Xóa đơn ${o.code}?`)) return;
    setOrders(os=>os.filter(x=>x.id!==id));
    addLog("order_delete",`Xóa đơn ${o.code}`);
    showToast("Đã xóa");
  };

  const exportXLS = () => {
    const rows = visibleOrders.filter(matchSearch).map(o=>{
      const c = customers.find(x=>x.id===o.customerId);
      return { "Mã đơn":o.code, "Khách":o.customerName, "Địa chỉ":c?.address||"", "ĐT":c?.phone||"", "Ngày":o.date, "Tổng":o.total, "Người tạo":o.createdByName, "Đã duyệt":o.approved?"Có":"Chờ", "Giao hàng":o.delivered?"Đã giao":"Chưa", "Trả hàng":o.returned?"Có":"Không", "Thanh toán":o.isPaid?"Đã TT":"Chưa TT" };
    });
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Đơn hàng"); XLSX.writeFile(wb,"don-hang.xlsx"); showToast("Đã xuất Excel");
  };

  const openNew = () => setModal(
    <OrderForm u={u} customers={customers} products={products}
      onAddCustomer={(nc) => { setCusts(cs=>[...cs,nc]); addLog("customer_create",`Thêm KH nhanh: ${nc.name}`); }}
      onSave={order=>{
        const code=`DH${String(orders.length+1).padStart(3,"0")}`;
        setOrders(os=>[{...order,id:uid(),code,approved:false,delivered:false,returned:false,isPaid:order.paid>=order.total},...os]);
        setCusts(cs=>cs.map(c=>c.id===order.customerId?{...c,totalBought:(c.totalBought||0)+order.total}:c));
        addLog("order_create",`Tạo đơn ${code} — ${order.customerName} — ${fmt(order.total)}`);
        setModal(null); showToast("Đã tạo đơn — chờ duyệt xuất kho");
      }} onClose={()=>setModal(null)} />
  );

  const openCustomer = (cid) => { setSelectedCustomerId(cid); setPage("customer_detail"); };
  const openOrder = (oid) => { setSelectedOrderId(oid); setPage("order_detail"); };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <SInput value={search} onChange={setSearch} placeholder="Tìm đơn hàng / khách hàng..." />
        <button className="btn btn-ghost btn-sm" onClick={exportXLS}><Ic n="excel" s={14}/>Xuất Excel</button>
        {can(u,"order_create") && <button className="btn btn-primary" onClick={openNew}><Ic n="plus" s={14}/>Tạo đơn</button>}
      </div>
      {!can(u,"order_view_all") && <div style={{ fontSize:12, color:"var(--yellow)", background:"#f59e0b11", padding:"6px 12px", borderRadius:8 }}>⚡ Bạn chỉ thấy đơn hàng do mình tạo</div>}

      {/* ============== CHỜ DUYỆT ============== */}
      <div>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
          <span className="badge badge-yellow" style={{ fontSize:12 }}>📋 CHỜ DUYỆT</span>
          <span style={{ fontSize:13, color:"var(--muted)" }}>{pending.length} đơn — chưa xuất kho</span>
        </div>
        <div className="card" style={{ padding:0 }}>
          <div className="table-wrap">
            <table className="table">
              <thead>
                <tr>
                  <th>Mã đơn</th><th>Khách hàng</th>
                  <th className="hide-mobile">Địa chỉ</th><th className="hide-mobile">Điện thoại</th>
                  <th>Ngày</th><th>Tổng tiền</th>
                  <th className="hide-mobile">Người tạo</th>
                  <th style={{ textAlign:"right" }}>Thao tác</th>
                </tr>
              </thead>
              <tbody>
                {pending.length===0 && <tr><td colSpan={8} style={{ textAlign:"center", color:"var(--muted)", padding:30 }}>Không có đơn chờ duyệt</td></tr>}
                {pending.map(o=>{
                  const c = customers.find(x=>x.id===o.customerId);
                  return (
                    <tr key={o.id}>
                      <td><a className="link" onClick={()=>openOrder(o.id)}>{o.code}</a></td>
                      <td><a className="link-name" onClick={()=>openCustomer(o.customerId)}>{o.customerName}</a></td>
                      <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{c?.address||"—"}</td>
                      <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{c?.phone||"—"}</td>
                      <td style={{ color:"var(--muted)" }}>{o.date}</td>
                      <td style={{ fontWeight:700 }}>{fmt(o.total)}</td>
                      <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{o.createdByName}</td>
                      <td>
                        <div style={{ display:"flex", gap:5, justifyContent:"flex-end" }}>
                          <button className="btn btn-ghost btn-xs" onClick={()=>printInvoice(o)} title="In đơn"><Ic n="print" s={13}/></button>
                          {can(u,"order_delete") && <button className="btn btn-danger btn-xs" onClick={()=>deleteOrder(o.id)} title="Xóa"><Ic n="trash" s={13}/></button>}
                          {can(u,"order_edit_any") && <button className="btn btn-primary btn-xs" onClick={()=>approveOrder(o.id)} title="Duyệt & xuất kho"><Ic n="check" s={13}/>Duyệt</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* ============== ĐÃ XUẤT KHO ============== */}
      <div>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
          <span className="badge badge-green" style={{ fontSize:12 }}>📦 ĐÃ XUẤT KHO</span>
          <span style={{ fontSize:13, color:"var(--muted)" }}>{exported.length} đơn — đang giao / hoàn tất</span>
        </div>
        <div className="card" style={{ padding:0 }}>
          <div className="table-wrap">
            <table className="table">
              <thead>
                <tr>
                  <th>Mã đơn</th><th>Khách hàng</th>
                  <th className="hide-mobile">Địa chỉ</th><th className="hide-mobile">Điện thoại</th>
                  <th>Ngày</th><th>Tổng tiền</th>
                  <th className="hide-mobile">Người tạo</th>
                  <th>Giao hàng</th><th>Hàng trả</th><th>Thanh toán</th><th></th>
                </tr>
              </thead>
              <tbody>
                {exported.length===0 && <tr><td colSpan={11} style={{ textAlign:"center", color:"var(--muted)", padding:30 }}>Chưa có đơn nào đã xuất kho</td></tr>}
                {exported.map(o=>{
                  const c = customers.find(x=>x.id===o.customerId);
                  return (
                    <tr key={o.id}>
                      <td><a className="link" onClick={()=>openOrder(o.id)}>{o.code}</a></td>
                      <td><a className="link-name" onClick={()=>openCustomer(o.customerId)}>{o.customerName}</a></td>
                      <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{c?.address||"—"}</td>
                      <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{c?.phone||"—"}</td>
                      <td style={{ color:"var(--muted)" }}>{o.date}</td>
                      <td style={{ fontWeight:700 }}>{fmt(o.total)}</td>
                      <td className="hide-mobile" style={{ color:"var(--muted)", fontSize:12 }}>{o.createdByName}</td>
                      <td>
                        <button className={`badge ${o.delivered?"badge-green":"badge-red"} clickable`} onClick={()=>toggleDelivered(o.id)} title="Click để đổi">
                          {o.delivered ? "✓ Đã giao" : "⏳ Chưa giao"}
                        </button>
                      </td>
                      <td>
                        <button className={`badge ${o.returned?"badge-red":"badge-green"} clickable`} onClick={()=>toggleReturned(o.id)} title="Click để đổi">
                          {o.returned ? "↩ Có trả" : "Không"}
                        </button>
                      </td>
                      <td>
                        <button className={`badge ${o.isPaid?"badge-green":"badge-red"} clickable`} onClick={()=>togglePaid(o.id)} title="Click để đổi">
                          {o.isPaid ? "✓ Đã TT" : "✕ Chưa TT"}
                        </button>
                      </td>
                      <td>
                        <div style={{ display:"flex", gap:5, justifyContent:"flex-end" }}>
                          <button className="btn btn-ghost btn-xs" onClick={()=>printInvoice(o)} title="In"><Ic n="print" s={13}/></button>
                          {can(u,"order_delete") && <button className="btn btn-danger btn-xs" onClick={()=>deleteOrder(o.id)}><Ic n="trash" s={13}/></button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function CustomerDetailPage({ ctx, customerId, setPage, setSelectedOrderId }) {
  const { customers, orders } = ctx;
  const c = customers.find(x=>x.id===customerId);
  if(!c) return <div style={{ padding:30, textAlign:"center", color:"var(--muted)" }}>Không tìm thấy KH. <button className="btn btn-ghost btn-sm" onClick={()=>setPage("customers")}>← Quay lại</button></div>;

  const custOrders = orders.filter(o=>o.customerId===customerId);
  const totalRev = custOrders.reduce((s,o)=>s+o.total,0);
  const totalPaid = custOrders.filter(o=>o.isPaid).reduce((s,o)=>s+o.total,0);
  const debt = totalRev - totalPaid;
  const delivered = custOrders.filter(o=>o.delivered).length;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage("customers")} style={{ alignSelf:"flex-start" }}>← Danh sách khách hàng</button>

      <div className="card">
        <div style={{ display:"flex", alignItems:"flex-start", gap:18, flexWrap:"wrap" }}>
          <div style={{ width:64, height:64, borderRadius:16, background:"linear-gradient(135deg,#00d4aa,#0055ff)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:26, fontWeight:800, color:"#0e1016" }}>
            {c.name?.charAt(0).toUpperCase()}
          </div>
          <div style={{ flex:1, minWidth:200 }}>
            <div style={{ fontSize:11, color:"var(--muted)", fontWeight:600 }}>{c.code}</div>
            <div style={{ fontSize:22, fontWeight:800, marginBottom:8 }}>{c.name}</div>
            <div style={{ fontSize:13, color:"var(--muted)" }}>📞 {c.phone||"—"}</div>
            <div style={{ fontSize:13, color:"var(--muted)" }}>📍 {c.address||"—"}</div>
          </div>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:12 }}>
        {[
          { l:"Tổng đơn",       v:custOrders.length+" đơn", c:"var(--info)" },
          { l:"Đã giao",        v:delivered+" đơn",         c:"var(--acc)" },
          { l:"Tổng doanh thu", v:fmt(totalRev),            c:"var(--info)" },
          { l:"Đã thanh toán",  v:fmt(totalPaid),           c:"var(--green)" },
          { l:"Còn nợ",         v:fmt(debt),                c:debt>0?"var(--danger)":"var(--green)" },
        ].map((s,i)=>(
          <div key={i} className="card" style={{ borderTop:`3px solid ${s.c}` }}>
            <div style={{ fontSize:11, color:"var(--muted)", fontWeight:600, marginBottom:6 }}>{s.l}</div>
            <div style={{ fontSize:16, fontWeight:800, color:s.c }}>{s.v}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding:0 }}>
        <div style={{ padding:"14px 18px", borderBottom:"1px solid var(--bdr)", fontWeight:700 }}>📋 Lịch sử đơn hàng</div>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th>Mã đơn</th><th>Ngày</th><th>Giá trị</th><th>Trạng thái</th><th>Giao hàng</th><th>TT</th></tr></thead>
            <tbody>
              {custOrders.length===0 && <tr><td colSpan={6} style={{ textAlign:"center", color:"var(--muted)", padding:30 }}>Chưa có đơn hàng</td></tr>}
              {custOrders.map(o=>(
                <tr key={o.id}>
                  <td><a className="link" onClick={()=>{ setSelectedOrderId(o.id); setPage("order_detail"); }}>{o.code}</a></td>
                  <td style={{ color:"var(--muted)" }}>{o.date}</td>
                  <td style={{ fontWeight:700 }}>{fmt(o.total)}</td>
                  <td><span className={`badge ${o.approved?"badge-green":"badge-yellow"}`}>{o.approved?"Đã xuất":"Chờ duyệt"}</span></td>
                  <td>{o.approved && <span className={`badge ${o.delivered?"badge-green":"badge-red"}`}>{o.delivered?"Đã giao":"Chưa"}</span>}</td>
                  <td>{o.approved && <span className={`badge ${o.isPaid?"badge-green":"badge-red"}`}>{o.isPaid?"Đã TT":"Chưa"}</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function OrderForm({ u, customers, products, onSave, onClose, onAddCustomer }) {
  const draftKey = `sp3_draft_order_${u.id}`;
  const savedDraft = (() => { try { const s=localStorage.getItem(draftKey); return s?JSON.parse(s):null; } catch { return null; } })();

  const [custSearch,  setCustSearch]  = useState("");
  const [custId,      setCustId]      = useState(savedDraft?.custId || "");
  const [showCustDD,  setShowCustDD]  = useState(false);
  const [prodSearch,  setProdSearch]  = useState("");
  const [showProdDD,  setShowProdDD]  = useState(false);
  const [priceType,   setPriceType]   = useState("price");
  const [items,       setItems]       = useState(savedDraft?.items || []);
  const [paid,        setPaid]        = useState(savedDraft?.paid || 0);
  const [discount,    setDiscount]    = useState(savedDraft?.discount || 0);
  const [shippingFee, setShipFee]     = useState(savedDraft?.shippingFee || 0);
  const [shipping,    setShipping]    = useState(savedDraft?.shipping || "self");
  const [note,        setNote]        = useState(savedDraft?.note || "");
  const [hasDraft,    setHasDraft]    = useState(!!savedDraft);

  const saveDraft = () => {
    localStorage.setItem(draftKey, JSON.stringify({ custId, items, paid, discount, shippingFee, shipping, note }));
    setHasDraft(true);
  };
  const clearDraft = () => { localStorage.removeItem(draftKey); setHasDraft(false); };

  const subtotal = items.reduce((s,i)=>s+i.qty*i.price, 0);
  const total = Math.max(0, subtotal - discount + shippingFee);
  const debt = Math.max(0, total - paid);

  // New customer form state
  const [newCustName,   setNewCustName]   = useState(custSearch);
  const [newCustPhone,  setNewCustPhone]  = useState("");
  const [newCustSoNha,  setNewCustSoNha]  = useState("");
  const [newCustDuong,  setNewCustDuong]  = useState("");
  const [newCustPhuong, setNewCustPhuong] = useState("");
  const [newCustTP,     setNewCustTP]     = useState("");
  const [showNewCust,   setShowNewCust]   = useState(false);

  // Customer search — filter by name OR phone OR address. Show dropdown only when typing
  const custFiltered = custSearch.trim()
    ? customers.filter(c =>
        smartMatch(c.name,custSearch) || smartMatch(c.phone,custSearch) || smartMatch(c.code,custSearch)
      ).slice(0, 8)
    : [];

  const selectCustomer = (c) => { setCustId(c.id); setCustSearch(""); setShowCustDD(false); setShowNewCust(false); };

  const handleCustInput = (val) => {
    setCustSearch(val);
    setCustId("");
    setShowCustDD(true);
    setNewCustName(val);
    // Hide new-cust form while results match
    setShowNewCust(false);
  };

  // When dropdown closes without picking — show new customer form if search has text
  const handleCustBlur = () => {
    setTimeout(() => {
      setShowCustDD(false);
      if (custSearch.trim() && !custId) setShowNewCust(true);
    }, 180);
  };

  const submitNewCust = () => {
    const addr = [newCustSoNha, newCustDuong, newCustPhuong, newCustTP].filter(Boolean).join(", ");
    const nc = { id:uid(), code:`KH${String(customers.length+1).padStart(3,"0")}`, name:newCustName, phone:newCustPhone, address:addr, totalBought:0 };
    onAddCustomer(nc);
    setCustId(nc.id);
    setShowNewCust(false);
    setCustSearch("");
  };

  // Product search filter
  const prodFiltered = prodSearch.trim()
    ? products.filter(p => smartMatch(p.name,prodSearch) || smartMatch(p.code,prodSearch)).slice(0,10)
    : [];

  const addProduct = (p) => {
    const usePrice = priceType === "retailPrice" ? (p.retailPrice || p.price) : p.price;
    const existing = items.find(i=>i.productId===p.id);
    if (existing) setItems(is=>is.map(x=>x.productId===p.id?{...x,qty:x.qty+1}:x));
    else setItems(is=>[...is, { productId:p.id, productName:p.name, unit:p.unit, qty:1, price:usePrice, stock:p.stock }]);
    setProdSearch(""); setShowProdDD(false);
  };

  const addCustomProduct = () => {
    if (!prodSearch.trim()) return;
    // Thêm vào đơn ngay — không bắt buộc thêm vào danh sách
    setItems(is=>[...is, { productId:"custom_"+uid(), productName:prodSearch, unit:"Cái", qty:1, price:0, stock:999, isCustom:true }]);
    setProdSearch(""); setShowProdDD(false);
  };

  const setItem = (idx,k,v) => setItems(is=>is.map((x,i)=>i===idx?{...x,[k]:v}:x));
  const removeItem = (idx) => setItems(is=>is.filter((_,i)=>i!==idx));

  const save = () => {
    if (!custId) return;
    if (items.length === 0) return;
    const cust2 = customers.find(c=>c.id===custId);
    const enriched = items.map(i=>({ productId:i.productId, productName:i.productName, unit:i.unit, qty:i.qty, price:i.price }));
    onSave({ customerId:custId, customerName:cust2?.name, date:todayStr(), total, paid:Math.min(paid,total), status: paid>=total?"paid":paid>0?"partial":"unpaid", items:enriched, discount, shippingFee, shipping, note, createdBy:u.id, createdByName:u.name });
    clearDraft();
  };

  const cust = customers.find(c=>c.id===custId);
  const boxS = { background:"var(--sur2)", borderRadius:10, padding:"12px 14px", border:"1px solid var(--bdr)" };

  return (
    <div style={{ maxWidth:820 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h3 style={{ fontWeight:800, fontSize:17 }}>Tạo đơn hàng mới</h3>
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn btn-ghost btn-sm" onClick={saveDraft}><Ic n="save" s={14}/>Lưu nháp</button>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
        </div>
      </div>
      {hasDraft && <div style={{ fontSize:12, color:"var(--acc)", background:"#00d4aa0f", padding:"6px 12px", borderRadius:8, marginBottom:12, border:"1px solid #00d4aa22" }}>📂 Bản nháp đã lưu — <button onClick={clearDraft} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--danger)",fontSize:12,fontFamily:"inherit" }}>Xóa nháp</button></div>}

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

        {/* ═══ THÔNG TIN KHÁCH HÀNG ═══ */}
        <div style={boxS}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
            <Ic n="users" s={14}/>
            <span style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", color:"var(--muted)", letterSpacing:"0.06em" }}>Thông tin khách hàng</span>
          </div>

          {/* Search box */}
          {!cust && (
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)", zIndex:1 }}><Ic n="search" s={14}/></span>
              <input className="input" style={{ paddingLeft:34 }}
                placeholder="Tìm tên, SĐT, mã KH... hoặc nhập tên khách mới"
                value={custSearch}
                onChange={e=>handleCustInput(e.target.value)}
                onFocus={()=>{ if(custSearch.trim()) setShowCustDD(true); }}
                onBlur={handleCustBlur}
              />
              {/* Dropdown results */}
              {showCustDD && custFiltered.length>0 && (
                <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:50, background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:10, marginTop:4, maxHeight:240, overflowY:"auto", boxShadow:"0 8px 24px #00000055" }}>
                  {custFiltered.map(c=>(
                    <div key={c.id}
                      onMouseDown={()=>selectCustomer(c)}
                      style={{ padding:"10px 14px", cursor:"pointer", borderBottom:"1px solid var(--bdr)22" }}
                      onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{ fontWeight:700, fontSize:13 }}>{c.name} <span style={{ color:"var(--muted)", fontWeight:400, fontSize:11 }}>— {c.code}</span></div>
                      <div style={{ fontSize:11, color:"var(--muted)", display:"flex", gap:12, flexWrap:"wrap" }}>
                        <span>📞 {c.phone||"—"}</span>
                        <span>📍 {c.address||"—"}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Selected customer card */}
          {cust && (
            <div style={{ background:"var(--bg)", borderRadius:8, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:14, color:"var(--acc)", marginBottom:3 }}>{cust.name}</div>
                <div style={{ fontSize:12, color:"var(--muted)", display:"flex", gap:16, flexWrap:"wrap" }}>
                  <span>📞 {cust.phone||"—"}</span>
                  <span>📍 {cust.address||"—"}</span>
                </div>
              </div>
              <button onMouseDown={()=>{ setCustId(""); setCustSearch(""); setShowNewCust(false); }} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--danger)",padding:4 }}>
                <Ic n="x" s={14}/>
              </button>
            </div>
          )}

          {/* New customer form — shown when search text doesn't match any existing KH */}
          {showNewCust && !cust && (
            <div style={{ background:"var(--bg)", borderRadius:8, padding:"12px 14px", marginTop:8, border:"1px dashed var(--acc)55" }}>
              <div style={{ fontSize:11, color:"var(--acc)", fontWeight:700, marginBottom:10 }}>⚡ Khách mới — điền thông tin:</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>TÊN KHÁCH HÀNG *</label>
                  <input className="input" value={newCustName} onChange={e=>setNewCustName(e.target.value)} placeholder="Tên KH..." style={{ fontSize:12 }}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>SỐ ĐIỆN THOẠI</label>
                  <input className="input" value={newCustPhone} onChange={e=>setNewCustPhone(e.target.value)} placeholder="09xx..." style={{ fontSize:12 }}/>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"80px 1fr 1fr 1fr", gap:8, marginBottom:10 }}>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>SỐ NHÀ</label>
                  <input className="input" value={newCustSoNha} onChange={e=>setNewCustSoNha(e.target.value)} placeholder="123" style={{ fontSize:12 }}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>ĐƯỜNG</label>
                  <input className="input" value={newCustDuong} onChange={e=>setNewCustDuong(e.target.value)} placeholder="Đường..." style={{ fontSize:12 }}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>PHƯỜNG</label>
                  <input className="input" value={newCustPhuong} onChange={e=>setNewCustPhuong(e.target.value)} placeholder="Phường..." style={{ fontSize:12 }}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"var(--muted)", display:"block", marginBottom:2 }}>THÀNH PHỐ</label>
                  <input className="input" value={newCustTP} onChange={e=>setNewCustTP(e.target.value)} placeholder="Hà Nội" style={{ fontSize:12 }}/>
                </div>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button className="btn btn-primary btn-sm" onClick={submitNewCust} disabled={!newCustName.trim()}>
                  <Ic n="plus" s={13}/>Thêm & chọn KH này
                </button>
                <button className="btn btn-ghost btn-sm" onClick={()=>{ setShowNewCust(false); setCustSearch(""); }}>Bỏ qua</button>
              </div>
            </div>
          )}
        </div>

        {/* ═══ THÔNG TIN SẢN PHẨM ═══ */}
        <div style={boxS}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <Ic n="box" s={14}/>
              <span style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", color:"var(--muted)", letterSpacing:"0.06em" }}>Sản phẩm</span>
              <span style={{ fontSize:11, color:"var(--muted)" }}>({items.length})</span>
            </div>
            {/* Chọn loại giá */}
            <div style={{ display:"flex", gap:4 }}>
              <button className={`btn btn-xs ${priceType==="price"?"btn-primary":"btn-ghost"}`} onClick={()=>setPriceType("price")}>Giá buôn</button>
              <button className={`btn btn-xs ${priceType==="retailPrice"?"btn-primary":"btn-ghost"}`} onClick={()=>setPriceType("retailPrice")}>Giá lẻ</button>
            </div>
          </div>

          {/* Search product */}
          <div style={{ position:"relative", marginBottom:8 }}>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)" }}><Ic n="search" s={14}/></span>
              <input className="input" style={{ paddingLeft:34 }} placeholder="Tìm sản phẩm (SP đặc biệt: gõ tên rồi chọn 'Thêm SP này')..."
                value={prodSearch}
                onFocus={()=>setShowProdDD(true)}
                onChange={e=>{ setProdSearch(e.target.value); setShowProdDD(true); }}
                onBlur={()=>setTimeout(()=>setShowProdDD(false),180)}
              />
            </div>
            {showProdDD && prodSearch.trim() && (
              <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:50, background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:10, marginTop:4, maxHeight:260, overflowY:"auto", boxShadow:"0 8px 24px #00000055" }}>
                {prodFiltered.map(p=>(
                  <div key={p.id} onMouseDown={()=>addProduct(p)}
                    style={{ padding:"10px 14px", cursor:"pointer", borderBottom:"1px solid var(--bdr)22", display:"flex", justifyContent:"space-between", alignItems:"center" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:13 }}>{p.name}</div>
                      <div style={{ fontSize:11, color:"var(--muted)" }}>{p.code} · {p.unit} · Buôn: {fmt(p.price)}{p.retailPrice?` · Lẻ: ${fmt(p.retailPrice)}`:""}</div>
                    </div>
                    <span className={`badge ${p.stock<30?"badge-red":p.stock<50?"badge-yellow":"badge-green"}`}>Kho: {p.stock}</span>
                  </div>
                ))}
                {/* Thêm SP đặc biệt/đặt riêng không có trong danh sách */}
                <div onMouseDown={addCustomProduct}
                  style={{ padding:"10px 14px", cursor:"pointer", color:"var(--acc)", fontWeight:600, fontSize:13, display:"flex", alignItems:"center", gap:6 }}
                  onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <Ic n="plus" s={13}/> Thêm SP đặc biệt: "<b>{prodSearch}</b>"
                </div>
              </div>
            )}
          </div>

          {/* Items table */}
          {items.length===0 && (
            <div style={{ textAlign:"center", padding:"16px 10px", color:"var(--muted)" }}>
              <span style={{ fontSize:12 }}>Tìm sản phẩm ở ô trên để thêm</span>
            </div>
          )}
          {items.length>0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              {/* Header */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 60px 68px 90px 80px 22px", gap:5, padding:"0 4px" }}>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700 }}>SẢN PHẨM</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center" }}>ĐVT</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center" }}>SL</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"right" }}>ĐƠN GIÁ</span>
                <span style={{ fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"right" }}>THÀNH TIỀN</span>
                <span></span>
              </div>
              {items.map((item,idx)=>(
                <div key={idx} style={{ display:"grid", gridTemplateColumns:"1fr 60px 68px 90px 80px 22px", gap:5, alignItems:"center", padding:"5px 4px", background:"var(--bg)", borderRadius:6 }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:12, lineHeight:1.2 }}>{item.productName}</div>
                    {item.stock!==999 && <div style={{ fontSize:10, color:(item.stock||0)<item.qty?"var(--danger)":"var(--muted)" }}>Kho: {item.stock||"?"}</div>}
                    {item.isCustom && <div style={{ fontSize:10, color:"var(--yellow)" }}>⚡ SP đặc biệt</div>}
                  </div>
                  <input className="input" value={item.unit} onChange={e=>setItem(idx,"unit",e.target.value)} style={{ padding:"3px 5px", fontSize:11, textAlign:"center" }}/>
                  <input className="input" type="number" min="1" value={item.qty} onChange={e=>setItem(idx,"qty",+e.target.value)} style={{ padding:"3px 5px", fontSize:12, textAlign:"center" }}/>
                  <input className="input" type="number" value={item.price} onChange={e=>setItem(idx,"price",+e.target.value)} style={{ padding:"3px 5px", fontSize:12, textAlign:"right" }}/>
                  <div style={{ fontWeight:700, fontSize:12, color:"var(--acc)", textAlign:"right" }}>{fmt(item.qty*item.price)}</div>
                  <button onClick={()=>removeItem(idx)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--danger)",padding:0 }}><Ic n="x" s={13}/></button>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ═══ GHI CHÚ & GIAO HÀNG ═══ */}
        <div style={boxS}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
            <Ic n="truck" s={14}/>
            <span style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", color:"var(--muted)", letterSpacing:"0.06em" }}>Đóng gói & Giao hàng</span>
          </div>

          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
            {[
              { v:"self",    label:"🚛 Tự giao" },
              { v:"3rd",     label:"📦 Gửi vận chuyển" },
              { v:"pickup",  label:"🏪 KH nhận tại kho" },
              { v:"later",   label:"⏳ Giao hàng sau" },
            ].map(opt=>(
              <button key={opt.v}
                className={`btn btn-sm ${shipping===opt.v?"btn-primary":"btn-ghost"}`}
                onClick={()=>setShipping(opt.v)}
                style={{ fontSize:12 }}>
                {opt.label}
              </button>
            ))}
          </div>

          <div><label className="label">Ghi chú đơn hàng</label>
            <textarea className="input" rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="VD: Hàng dễ vỡ, gọi trước khi giao..." style={{ resize:"vertical" }} />
          </div>
        </div>

        {/* ═══ TỔNG TIỀN ═══ */}
        <div style={{ ...boxS, borderColor:"var(--acc)33" }}>
          <div className="form-row" style={{ marginBottom:12 }}>
            <div><label className="label">Chiết khấu (đ)</label><input className="input" type="number" value={discount} onChange={e=>setDiscount(+e.target.value)} /></div>
            <div><label className="label">Phí giao hàng (đ)</label><input className="input" type="number" value={shippingFee} onChange={e=>setShipFee(+e.target.value)} /></div>
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:4, fontSize:13, marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"var(--muted)" }}>Tổng tiền {items.length} sản phẩm:</span>
              <span>{fmt(subtotal)}</span>
            </div>
            {discount>0 && <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"var(--muted)" }}>Chiết khấu:</span>
              <span style={{ color:"var(--danger)" }}>-{fmt(discount)}</span>
            </div>}
            {shippingFee>0 && <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"var(--muted)" }}>Phí giao hàng:</span>
              <span>+{fmt(shippingFee)}</span>
            </div>}
            <div style={{ height:1, background:"var(--bdr)", margin:"4px 0" }} />
            <div style={{ display:"flex", justifyContent:"space-between", fontWeight:800, fontSize:16 }}>
              <span>Tổng cộng:</span>
              <span style={{ color:"var(--acc)" }}>{fmt(total)}</span>
            </div>
          </div>

          <div style={{ marginBottom:8 }}>
            <label className="label">Khách trả ngay (đ)</label>
            <input className="input" type="number" value={paid} onChange={e=>setPaid(+e.target.value)} style={{ fontSize:15, fontWeight:700 }} />
          </div>

          {debt>0 && <div style={{ background:"#f43f5e0f", border:"1px solid #f43f5e22", borderRadius:8, padding:"8px 12px", color:"var(--danger)", fontSize:13, fontWeight:600 }}>
            ⚠ Khách phải trả: {fmt(debt)}
          </div>}
          {debt===0 && total>0 && <div style={{ background:"#10b9810f", border:"1px solid #10b98122", borderRadius:8, padding:"8px 12px", color:"var(--green)", fontSize:13, fontWeight:600 }}>
            ✓ Khách đã trả đủ
          </div>}
        </div>

        {/* ═══ BUTTONS ═══ */}
        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Thoát</button>
          <button className="btn btn-primary" onClick={save} disabled={!custId || items.length===0} style={{ padding:"10px 24px" }}>
            <Ic n="check" s={15}/>Tạo đơn hàng
          </button>
        </div>
      </div>
    </div>
  );
}

// Return form modal
function ReturnForm({ order, products, onConfirm, onClose }) {
  const [reason, setReason] = useState("");
  // Danh sách SP trả: bắt đầu với SP của đơn
  const [returnItems, setReturnItems] = useState(
    (order.items||[]).map(it => ({
      productId: it.productId,
      productName: it.productName,
      unit: it.unit || "",
      qty: it.qty,
      selected: true,
      fromOrder: true,
    }))
  );
  const [prodSearch, setProdSearch] = useState("");
  const [showDD, setShowDD] = useState(false);

  const toggleItem = (idx) => setReturnItems(is => is.map((x,i) => i===idx ? {...x, selected:!x.selected} : x));
  const setQty = (idx, v) => setReturnItems(is => is.map((x,i) => i===idx ? {...x, qty: Math.max(0,v)} : x));
  const removeExtra = (idx) => setReturnItems(is => is.filter((_,i) => i!==idx));

  const prodFiltered = prodSearch.trim()
    ? products.filter(p => smartMatch(p.name,prodSearch) || smartMatch(p.code,prodSearch)).slice(0,8)
    : [];

  const addReturnProduct = (p) => {
    const exists = returnItems.find(x => x.productId === p.id);
    if (exists) {
      setReturnItems(is => is.map(x => x.productId===p.id ? {...x, qty: x.qty+1, selected:true} : x));
    } else {
      setReturnItems(is => [...is, { productId:p.id, productName:p.name, unit:p.unit||"", qty:1, selected:true, fromOrder:false }]);
    }
    setProdSearch(""); setShowDD(false);
  };

  const selectedItems = returnItems.filter(x => x.selected);

  return (
    <div style={{ minWidth:480 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h3 style={{ fontWeight:800 }}>↩ Trả hàng — {order.code}</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

        {/* SP của đơn hàng */}
        <div>
          <label className="label">Sản phẩm trả lại</label>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {returnItems.map((it, idx) => (
              <div key={idx} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background: it.selected ? "var(--sur2)" : "transparent", borderRadius:8, border:"1px solid var(--bdr)" }}>
                <input type="checkbox" checked={it.selected} onChange={()=>toggleItem(idx)} style={{ cursor:"pointer" }} />
                <span style={{ flex:1, fontWeight:600, fontSize:13 }}>
                  {it.productName}
                  {!it.fromOrder && <span style={{ marginLeft:6, fontSize:10, color:"var(--yellow)", background:"#f59e0b11", padding:"1px 6px", borderRadius:4 }}>bổ sung</span>}
                </span>
                <span style={{ fontSize:12, color:"var(--muted)" }}>SL:</span>
                <input className="input" type="number" min="0" value={it.qty}
                  onChange={e=>setQty(idx,+e.target.value)}
                  disabled={!it.selected}
                  style={{ width:70, padding:"4px 8px", textAlign:"center" }} />
                {!it.fromOrder && (
                  <button onClick={()=>removeExtra(idx)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--danger)",padding:2 }}><Ic n="x" s={13}/></button>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Tìm thêm SP bất kỳ để nhập trả */}
        <div>
          <label className="label">Thêm sản phẩm trả khác (từ các đơn trước)</label>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"var(--muted)" }}><Ic n="search" s={13}/></span>
            <input className="input" style={{ paddingLeft:34 }}
              placeholder="Tìm tên hoặc mã SP để thêm vào danh sách trả..."
              value={prodSearch}
              onChange={e=>{ setProdSearch(e.target.value); setShowDD(true); }}
              onFocus={()=>setShowDD(true)}
              onBlur={()=>setTimeout(()=>setShowDD(false), 180)}
            />
            {showDD && prodSearch.trim() && (
              <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:50, background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:10, marginTop:4, maxHeight:200, overflowY:"auto", boxShadow:"0 8px 24px #00000055" }}>
                {prodFiltered.length===0 && <div style={{ padding:12, color:"var(--muted)", fontSize:12, textAlign:"center" }}>Không tìm thấy sản phẩm</div>}
                {prodFiltered.map(p=>(
                  <div key={p.id} onMouseDown={()=>addReturnProduct(p)}
                    style={{ padding:"9px 14px", cursor:"pointer", borderBottom:"1px solid var(--bdr)22", display:"flex", justifyContent:"space-between", alignItems:"center" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:13 }}>{p.name}</div>
                      <div style={{ fontSize:11, color:"var(--muted)" }}>{p.code} · {p.unit}</div>
                    </div>
                    <span className="badge badge-green" style={{ fontSize:10 }}>Kho: {p.stock}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Lý do */}
        <div>
          <label className="label">Lý do trả hàng</label>
          <textarea className="input" rows={2} value={reason} onChange={e=>setReason(e.target.value)}
            placeholder="VD: Hàng bị hỏng, sai mẫu, KH đổi ý..." style={{ resize:"vertical" }} />
        </div>

        {selectedItems.length>0 && (
          <div style={{ background:"var(--sur2)", borderRadius:8, padding:"8px 14px", fontSize:12, color:"var(--muted)" }}>
            ✓ Sẽ hoàn kho: {selectedItems.map(x=>`${x.productName} (${x.qty})`).join(", ")}
          </div>
        )}

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-danger" onClick={()=>onConfirm(reason, selectedItems)} disabled={!reason.trim() || selectedItems.length===0}>
            <Ic n="check" s={15}/>Xác nhận trả hàng
          </button>
        </div>
      </div>
    </div>
  );
}

// PURCHASES
